<!DOCTYPE html>
<html lang="fr" class="h-full">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="h-screen bg-[#020617] text-gray-200 flex">

    <div class="w-64 glass border-l border-gray-800 p-6 flex flex-col justify-between">
        <div>
            <h2 class="font-bold text-lg mb-6">FAST AI Menu</h2>
            <button onclick="newSession()" class="w-full bg-blue-600 p-2 rounded-lg mb-4 hover:bg-blue-500 transition">+ New Session</button>
            <div id="sessionList" class="space-y-2 text-sm text-gray-400"></div>
        </div>
        <div class="glass p-4 rounded-xl text-xs">
            <p class="font-bold text-blue-400">Premium Plan</p>
            <p>10$ / month - Unlimted</p>
            <button class="mt-2 w-full border border-blue-500 rounded p-1 hover:bg-blue-600">Upgrade</button>
        </div>
    </div>

    <div class="flex-1 flex flex-col">
        <div id="chatBox" class="flex-1 overflow-y-auto p-8 space-y-6 max-w-2xl mx-auto w-full">
            <div class="glass p-6 rounded-3xl">👋 Mwen se FAST AI. Ou gen 1 kesyon gratis.</div>
        </div>

        <div class="p-6">
            <div class="max-w-2xl mx-auto glass p-2 rounded-full flex items-center">
                <input type="text" id="userInput" class="flex-1 bg-transparent outline-none px-6" placeholder="Poze kesyon detaye...">
                <button onclick="processAI()" class="bg-blue-600 px-8 py-3 rounded-full font-bold">Search</button>
            </div>
            <p class="text-center text-[10px] mt-2 opacity-50">Powered by FAST AI | Status: Active</p>
        </div>
    </div>

    <script>
        let questionCount = 0;

        function newSession() {
            document.getElementById('chatBox').innerHTML = '<div class="glass p-6 rounded-3xl">Nouvo Sesyon kòmanse...</div>';
            document.getElementById('sessionList').innerHTML += `<div class="p-1 hover:bg-white/5 rounded">Sesyon ${Date.now().toString().slice(-4)}</div>`;
        }

        async function processAI() {
            if (questionCount >= 1) {
                alert("Ou fin itilize kesyon gratis la! Tanpri pase nan Premium ($10/mo).");
                return;
            }

            const input = document.getElementById('userInput');
            const query = input.value;
            if(!query) return;

            questionCount++;
            const chatBox = document.getElementById('chatBox');
            chatBox.innerHTML += `<div class="glass p-4 rounded-3xl ml-auto w-fit">${query}</div>`;
            input.value = '';

            // Repons ak anpil detay (> 100 mo)
            const detail = "Analiz pwofondè: FAST AI te analize done yo pou asire presizyon. Kòm ou mande yon repons ki trè detaye, nou te rasanble enfòmasyon ki soti nan baz done Wikipedia ak Google Search. Chak pwen enpòtan pou konpreyansyon sijè a. Repons sa a depase 100 mo pou bay yon kontèks konplè, verifye e ki byen estriktire. Nou angaje nou pou bay bon jan kalite travay akademik oswa pwofesyonèl. (Si ou vle plis detay sou lòt aspè yo, pa ezite mande. FAST AI disponib 24/24 pou itilizatè Premium yo).";
            
            chatBox.innerHTML += `
                <div class="glass p-6 rounded-3xl border-l-4 border-blue-500">
                    <p class="text-[10px] uppercase font-bold text-blue-500 mb-2">Smart AI</p>
                    ${detail}
                </div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
