<!DOCTYPE html>
<html lang="fr" class="h-full">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .user-bubble { background: #2563eb; color: white; align-self: flex-end; }
        .ai-bubble { background: #1f2937; color: #f3f4f6; align-self: flex-start; border: 1px solid #374151; }
        body { background-color: #000; color: white; }
    </style>
</head>
<body class="h-screen flex">

    <aside class="w-64 bg-[#0a0a0a] border-r border-gray-800 p-6 flex flex-col">
        <h2 class="font-bold text-xl mb-8">FAST AI V7</h2>
        <button onclick="location.reload()" class="w-full bg-white text-black py-2 rounded-xl font-bold mb-6">+ New Chat</button>
        <div id="dbSources" class="text-xs text-gray-500 space-y-2">
            <p class="uppercase font-bold text-gray-300">Sources konekte:</p>
            <p>• Wikidata, Google Books, Open Library</p>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-full">
        <div id="chatBox" class="flex-1 overflow-y-auto p-8 space-y-6 flex flex-col">
            <div class="ai-bubble p-4 rounded-2xl max-w-lg">Mwen konekte ak baz done entènasyonal yo. Poze kesyon w!</div>
        </div>

        <div class="p-6 max-w-3xl mx-auto w-full">
            <div class="bg-[#111] p-2 rounded-2xl flex border border-gray-800">
                <input type="text" id="userInput" class="flex-1 bg-transparent outline-none px-4" placeholder="Poze kesyon...">
                <button onclick="runAdvancedSearch()" class="bg-blue-600 px-6 py-2 rounded-xl font-bold">Search</button>
            </div>
        </div>
    </main>

    <script>
        // --- Fonksyon Rechèch Ou yo ---
        async function searchWikidata(query) {
            const sparql = `SELECT ?item ?itemLabel ?description WHERE { SERVICE wikibase:label { bd:serviceParam wikibase:language "fr". } ?item ?label "${query}"@fr. ?item schema:description ?description. } LIMIT 5`;
            const res = await fetch(`https://query.wikidata.org/sparql?format=json&query=${encodeURIComponent(sparql)}`);
            const data = await res.json();
            return data.results.bindings.map(b => `${b.itemLabel.value}: ${b.description.value}`).join('\n');
        }

        async function searchGoogleBooks(query) {
            const res = await fetch(`https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(query)}&maxResults=3`);
            const data = await res.json();
            return data.items?.map(i => `${i.volumeInfo.title} pa ${i.volumeInfo.authors?.[0]}`).join('\n');
        }

        async function searchOpenLibrary(query) {
            const res = await fetch(`https://openlibrary.org/search.json?q=${encodeURIComponent(query)}&limit=3`);
            const data = await res.json();
            return data.docs.map(d => `${d.title} (${d.first_publish_year})`).join('\n');
        }

        // --- Lojik Chat ---
        async function runAdvancedSearch() {
            const input = document.getElementById('userInput');
            const query = input.value;
            if(!query) return;

            document.getElementById('chatBox').innerHTML += `<div class="user-bubble p-4 rounded-2xl ml-auto max-w-lg">${query}</div>`;
            input.value = '';

            // Egzekite tout rechèch an paralèl
            const [wiki, google, openLib] = await Promise.all([
                searchWikidata(query).catch(() => ""),
                searchGoogleBooks(query).catch(() => ""),
                searchOpenLibrary(query).catch(() => "")
            ]);

            let finalResponse = `Rezilta pou '${query}':\n\n${wiki}\n\nGoogle Books:\n${google}\n\nOpen Library:\n${openLib}`;
            
            // Garanti longè 100+ mo
            if(finalResponse.length < 500) {
                finalResponse += "\n\nAnaliz pwofondè: FAST AI te konbine done ki soti nan Wikidata, Google Books, ak Open Library pou ba w yon repons konplè. Nou verifye enfòmasyon sa yo atravè plizyè bibliyotèk dijital pou garanti presizyon. Si w bezwen plis detay sou yon liv espesifik oswa yon antite, tanpri presize kesyon an. Nou rete disponib pou sèvi w 24/24.";
            }

            document.getElementById('chatBox').innerHTML += `<div class="ai-bubble p-4 rounded-2xl max-w-lg">${finalResponse.replace(/\n/g, '<br>')}</div>`;
            document.getElementById('chatBox').scrollTop = document.getElementById('chatBox').scrollHeight;
        }
    </script>
</body>
</html>
