<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>FAST v4 — AI Assistant</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --void:      #080b12;
      --surface-1: #111622;
      --surface-2: #161d2e;
      --surface-3: #1c2540;
      --border-1:  rgba(100,140,220,0.12);
      --border-2:  rgba(100,140,220,0.22);
      --blue:      #2563eb;
      --blue-l:    #3b82f6;
      --blue-glow: #60a5fa;
      --text-100:  #f0f4ff;
      --text-60:   #8fa3c8;
      --text-30:   #3d4f6a;
      --green:     #22c55e;
      --gold:      #f59e0b;
      --sidebar-w: 280px;
    }

    html, body { height: 100%; overflow: hidden; background: var(--void); }
    body { font-family: 'Inter', system-ui, sans-serif; color: var(--text-100); }

    /* atmosphere */
    .atmos { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .atmos-blob { position: absolute; border-radius: 50%; filter: blur(120px); }
    .atmos-blob:nth-child(1) { width:600px;height:600px;top:-200px;left:-150px; background:radial-gradient(circle,rgba(37,99,235,0.16),transparent 70%); animation: breathe 14s ease-in-out infinite; }
    .atmos-blob:nth-child(2) { width:400px;height:400px;bottom:-100px;right:-100px; background:radial-gradient(circle,rgba(99,102,241,0.12),transparent 70%); animation: breathe 14s ease-in-out infinite -5s; }
    .atmos-blob:nth-child(3) { width:280px;height:280px;top:50%;left:45%; background:radial-gradient(circle,rgba(6,182,212,0.08),transparent 70%); animation: breathe 14s ease-in-out infinite -9s; }
    @keyframes breathe { 0%,100%{transform:scale(1) translate(0,0)} 50%{transform:scale(1.07) translate(10px,-8px)} }

    .grid-bg {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image: linear-gradient(rgba(100,140,220,0.025) 1px,transparent 1px), linear-gradient(90deg,rgba(100,140,220,0.025) 1px,transparent 1px);
      background-size: 44px 44px;
    }

    /* layout */
    .app { display:flex; height:100vh; position:relative; z-index:1; }

    /* ── SIDEBAR ── */
    .sidebar {
      width: var(--sidebar-w); flex-shrink: 0;
      background: rgba(9,12,21,0.96);
      backdrop-filter: blur(40px) saturate(180%);
      border-right: 1px solid var(--border-1);
      display: flex; flex-direction: column;
      transition: transform 0.28s cubic-bezier(.22,.88,.24,1);
      overflow: hidden;
    }

    /* brand */
    .brand-header {
      padding: 18px 16px 14px;
      border-bottom: 1px solid var(--border-1);
      background: linear-gradient(180deg, rgba(37,99,235,0.07), transparent);
      flex-shrink: 0;
    }
    .brand-row { display:flex; align-items:center; gap:12px; margin-bottom:10px; }
    .brand-icon {
      width:42px; height:42px;
      background: linear-gradient(145deg,#1d4ed8,#0891b2);
      border-radius:10px;
      display:flex; align-items:center; justify-content:center; font-size:20px;
      box-shadow: 0 0 22px rgba(37,99,235,0.38), 0 4px 14px rgba(0,0,0,0.5);
    }
    .brand-name {
      font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:17px; letter-spacing:-0.3px;
      background:linear-gradient(135deg,#fff 30%,#7ab3ff); -webkit-background-clip:text; background-clip:text; color:transparent;
    }
    .brand-sub { font-size:9.5px; color:var(--text-30); margin-top:2px; }
    .tag-haiti {
      display:inline-flex; align-items:center; gap:5px;
      background:rgba(245,158,11,0.08); border:1px solid rgba(245,158,11,0.22);
      border-radius:30px; padding:3px 9px; font-size:9px; font-weight:600; color:var(--gold); letter-spacing:.8px;
    }

    /* nav */
    .sidebar-nav { flex:1; overflow-y:auto; padding:10px 10px 4px; scrollbar-width:thin; scrollbar-color:var(--surface-3) transparent; }
    .sidebar-nav::-webkit-scrollbar { width:3px; }
    .sidebar-nav::-webkit-scrollbar-thumb { background:var(--surface-3); border-radius:3px; }

    .nav-section-label {
      font-size:8px; text-transform:uppercase; letter-spacing:2px;
      color:var(--text-30); padding:10px 6px 5px;
    }

    /* conversation history items */
    .conv-item {
      display:flex; align-items:center; gap:9px;
      padding:9px 10px; border-radius:10px;
      cursor:pointer; font-size:12px; color:var(--text-60);
      border:1px solid transparent;
      transition:background .18s, border-color .18s, color .18s;
      margin-bottom:2px;
    }
    .conv-item:hover { background:var(--surface-2); border-color:var(--border-1); color:var(--text-100); }
    .conv-item.active { background:rgba(37,99,235,0.12); border-color:rgba(59,130,246,0.28); color:var(--text-100); }
    .conv-icon { font-size:14px; flex-shrink:0; }
    .conv-text { flex:1; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; }
    .conv-time { font-size:9px; color:var(--text-30); flex-shrink:0; }

    /* sources grid */
    .sources-grid { display:grid; grid-template-columns:1fr 1fr; gap:4px; padding:0 10px 10px; }
    .src-item {
      background:var(--surface-1); border:1px solid rgba(255,255,255,0.04);
      border-radius:8px; padding:5px 7px;
      font-size:9.5px; color:var(--text-60);
      display:flex; align-items:center; gap:5px;
      transition:background .2s, border-color .2s;
    }
    .src-item:hover { background:var(--surface-2); border-color:var(--border-2); }
    .src-dot { width:5px; height:5px; border-radius:50%; flex-shrink:0; }
    .src-live {
      font-size:6.5px; font-family:'JetBrains Mono',monospace;
      background:rgba(34,197,94,0.08); border:1px solid rgba(34,197,94,0.25);
      color:var(--green); border-radius:20px; padding:1px 4px; margin-left:auto; flex-shrink:0;
    }

    /* WhatsApp section — NO QR */
    .wa-section {
      background:linear-gradient(145deg,rgba(37,211,102,0.07),rgba(37,211,102,0.02));
      border:1px solid rgba(37,211,102,0.18); border-radius:14px;
      padding:12px 11px; margin:0 10px 10px;
    }
    .wa-title { font-size:12px; font-weight:700; color:#25d366; display:flex; align-items:center; gap:7px; margin-bottom:10px; }
    .wa-status { font-size:10px; color:var(--green); text-align:center; margin-bottom:8px; }
    .wa-send-row { display:flex; gap:6px; }
    .wa-send-row input {
      flex:1; background:rgba(0,0,0,0.35); border:1px solid rgba(37,211,102,0.22);
      border-radius:30px; padding:7px 12px; font-size:10.5px; color:var(--text-100); outline:none; font-family:inherit;
      transition:border-color .2s;
    }
    .wa-send-row input:focus { border-color:rgba(37,211,102,0.45); }
    .wa-send-row button {
      background:linear-gradient(135deg,#25d366,#1aab53); border:none;
      border-radius:30px; padding:7px 13px; font-size:10.5px; font-weight:700; cursor:pointer; color:white;
    }

    /* new chat btn */
    .new-chat-btn {
      margin:0 10px 14px;
      background:rgba(37,99,235,0.08); border:1px solid rgba(37,99,235,0.22);
      border-radius:40px; padding:11px; text-align:center; cursor:pointer;
      font-size:12px; font-weight:500; color:var(--blue-glow);
      transition:background .2s, border-color .2s, color .2s; flex-shrink:0;
    }
    .new-chat-btn:hover { background:rgba(37,99,235,0.16); border-color:rgba(59,130,246,0.4); color:white; }

    /* ── MAIN ── */
    .main-chat { flex:1; display:flex; flex-direction:column; overflow:hidden; min-width:0; }

    /* topbar */
    .topbar {
      padding:11px 20px;
      background:rgba(8,11,18,0.88); backdrop-filter:blur(24px);
      border-bottom:1px solid var(--border-1);
      display:flex; align-items:center; gap:12px; flex-shrink:0;
    }
    .topbar-icon {
      width:34px; height:34px;
      background:linear-gradient(145deg,#1d4ed8,#0891b2);
      border-radius:9px; display:flex; align-items:center; justify-content:center; font-size:15px;
      box-shadow:0 0 14px rgba(37,99,235,0.3);
    }
    .topbar-title { font-size:14px; font-weight:600; letter-spacing:-.2px; }
    .topbar-sub   { font-size:10px; color:var(--text-60); margin-top:1px; }

    /* hamburger */
    .hamburger-btn {
      margin-left:auto;
      display:none;
      background:rgba(37,99,235,0.1); border:1px solid rgba(59,130,246,0.22);
      border-radius:8px; padding:7px 10px; cursor:pointer; color:var(--text-60);
      font-size:15px; transition:background .2s;
    }
    .hamburger-btn:hover { background:rgba(37,99,235,0.2); color:white; }

    /* messages */
    .chat-messages {
      flex:1; overflow-y:auto; padding:20px 20px;
      display:flex; flex-direction:column; gap:14px; scroll-behavior:smooth;
      scrollbar-width:thin; scrollbar-color:var(--surface-3) transparent;
    }
    .chat-messages::-webkit-scrollbar { width:4px; }
    .chat-messages::-webkit-scrollbar-thumb { background:var(--surface-2); border-radius:4px; }

    .message { display:flex; gap:10px; animation:msgIn .25s cubic-bezier(.22,.88,.24,1); }
    .message.user { flex-direction:row-reverse; }
    @keyframes msgIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:none} }

    .avatar { width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:14px; flex-shrink:0; }
    .av-user { background:linear-gradient(135deg,rgba(37,99,235,0.3),rgba(99,102,241,0.3)); }
    .av-ai   { background:linear-gradient(135deg,rgba(6,182,212,0.2),rgba(37,99,235,0.2)); }

    .msg-bubble {
      max-width:74%; padding:11px 16px;
      font-size:13.5px; line-height:1.68;
      background:var(--surface-1); border:1px solid var(--border-1);
      border-radius:20px 20px 20px 6px;
    }
    .message.user .msg-bubble {
      background:linear-gradient(145deg,rgba(29,78,216,0.22),rgba(37,99,235,0.14));
      border-color:rgba(59,130,246,0.28);
      border-radius:20px 20px 6px 20px;
    }

    /* source cards */
    .src-card {
      margin-top:8px; padding:9px 12px;
      background:rgba(0,0,0,0.22); border-radius:11px; border-left:2px solid;
    }
    .src-card-name { font-size:10px; font-weight:600; margin-bottom:3px; }
    .src-card-text { font-size:12.5px; color:var(--text-60); line-height:1.55; }

    .badge-row { display:flex; flex-wrap:wrap; gap:4px; margin-top:10px; }
    .badge {
      display:inline-flex; align-items:center; gap:3px;
      font-size:9px; font-weight:600; font-family:'JetBrains Mono',monospace;
      padding:2px 7px; border-radius:20px;
      background:rgba(34,197,94,0.08); border:1px solid rgba(34,197,94,0.2); color:#4ade80;
    }

    /* typing */
    .typing-dots { display:flex; gap:4px; align-items:center; padding:4px 0; }
    .typing-dots span { width:6px;height:6px;border-radius:50%;background:var(--blue-l);opacity:.7; animation:dotBounce 1.2s ease-in-out infinite; }
    .typing-dots span:nth-child(2){animation-delay:.15s}
    .typing-dots span:nth-child(3){animation-delay:.30s}
    @keyframes dotBounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px)}}

    /* input */
    .input-area { padding:12px 18px 20px; background:linear-gradient(to top,rgba(8,11,18,0.98) 60%,transparent); flex-shrink:0; }
    .input-glass {
      background:rgba(13,17,25,0.9); backdrop-filter:blur(30px);
      border:1px solid var(--border-2); border-radius:50px;
      display:flex; align-items:flex-end; padding:7px 7px 7px 18px; gap:8px;
      transition:border-color .2s;
    }
    .input-glass:focus-within { border-color:rgba(59,130,246,0.45); }
    #userInput {
      flex:1; background:transparent; border:none; outline:none;
      color:var(--text-100); font-size:13.5px; padding:10px 0;
      resize:none; font-family:inherit; line-height:1.5; max-height:120px; overflow-y:auto;
    }
    #userInput::placeholder { color:var(--text-30); }
    .send-btn {
      background:linear-gradient(145deg,#2563eb,#0891b2);
      border:none; width:42px; height:42px; border-radius:50%;
      cursor:pointer; color:white; font-size:16px; flex-shrink:0;
      box-shadow:0 0 18px rgba(37,99,235,0.35);
      transition:transform .15s, box-shadow .15s;
    }
    .send-btn:hover { transform:scale(1.07); box-shadow:0 0 26px rgba(59,130,246,0.5); }
    .send-btn:active { transform:scale(0.95); }
    .send-btn:disabled { opacity:.4; cursor:not-allowed; transform:none; }

    /* overlay for mobile */
    .sidebar-overlay {
      display:none; position:fixed; inset:0; background:rgba(0,0,0,0.55);
      backdrop-filter:blur(4px); z-index:99;
    }
    .sidebar-overlay.visible { display:block; }

    @media(max-width:740px) {
      .sidebar { position:fixed; top:0; left:0; height:100%; z-index:100; transform:translateX(-100%); }
      .sidebar.open { transform:translateX(0); }
      .hamburger-btn { display:flex; align-items:center; gap:6px; }
      .msg-bubble { max-width:90%; }
    }
  </style>
</head>
<body>

<div class="atmos"><div class="atmos-blob"></div><div class="atmos-blob"></div><div class="atmos-blob"></div></div>
<div class="grid-bg"></div>
<div class="sidebar-overlay" id="overlay"></div>

<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">

    <div class="brand-header">
      <div class="brand-row">
        <div class="brand-icon">⚡</div>
        <div>
          <div class="brand-name">FAST v4</div>
          <div class="brand-sub">Assistant Entèlijan</div>
        </div>
      </div>
      <div class="tag-haiti">🇭🇹 ENTREPRISE TECH HAITIAN</div>
    </div>

    <div class="sidebar-nav" id="sidebarNav">
      <!-- conversation history rendered by JS -->
    </div>

    <div class="nav-section-label" style="padding:4px 16px 6px">📡 Sources</div>
    <div class="sources-grid" id="sourcesGrid"></div>

    <div class="wa-section">
      <div class="wa-title"><span>📲</span> WhatsApp Bot</div>
      <div class="wa-status">🟢 Aktif — Klike pou kontakte</div>
      <div class="wa-send-row">
        <input type="text" id="waTestMsg" placeholder="Ekri yon mesaj…">
        <button onclick="sendTestWhatsApp()">Voye</button>
      </div>
    </div>

    <div class="new-chat-btn" id="newChatBtn">✨ Nouvo Konvèsasyon</div>
  </aside>

  <!-- MAIN -->
  <main class="main-chat">

    <div class="topbar">
      <div class="topbar-icon">⚡</div>
      <div>
        <div class="topbar-title">FAST v4</div>
        <div class="topbar-sub">Asistan pèsonèl ou</div>
      </div>
      <button class="hamburger-btn" id="hamburgerBtn">☰</button>
    </div>

    <div class="chat-messages" id="chatMessages"></div>

    <div class="input-area">
      <div class="input-glass">
        <textarea id="userInput" rows="1"
          placeholder="Poze nenpòt kesyon… météo, nouvèl, krypto, sante, fim, pwezi…"
          onkeydown="handleKey(event)"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendQuestion()">➤</button>
      </div>
    </div>

  </main>
</div>

<script>
// ═══════════════════════════════════════════════════════
// FAST v4 — Smart AI Assistant + 25 Sources
// ═══════════════════════════════════════════════════════

let isProcessing = false;
const conversations = [];
let activeConvId = null;

// ── SOURCES ──
const SOURCES = [
  { name:"Wikipedia FR", color:"#4ade80" },
  { name:"Wikipedia EN", color:"#4ade80" },
  { name:"DuckDuckGo",   color:"#facc15" },
  { name:"Open-Meteo",   color:"#38bdf8" },
  { name:"ExchangeRate", color:"#38bdf8" },
  { name:"CoinGecko",    color:"#10b981" },
  { name:"arXiv",        color:"#a78bfa" },
  { name:"PubMed",       color:"#f43f5e" },
  { name:"Google Books", color:"#fbbf24" },
  { name:"Open Library", color:"#f59e0b" },
  { name:"GitHub",       color:"#94a3b8" },
  { name:"TMDB Films",   color:"#ec4899" },
  { name:"Wiktionary",   color:"#10b981" },
  { name:"RestCountries",color:"#3b82f6" },
  { name:"NASA APOD",    color:"#06b6d4" },
  { name:"JokeAPI",      color:"#fbbf24" },
  { name:"Quotable",     color:"#38bdf8" },
  { name:"PoetryDB",     color:"#ec4899" },
  { name:"Trivia API",   color:"#a78bfa" },
  { name:"Claude AI",    color:"#a78bfa" },
];

function renderSources() {
  const g = document.getElementById('sourcesGrid');
  g.innerHTML = SOURCES.map(s => `
    <div class="src-item">
      <div class="src-dot" style="background:${s.color};box-shadow:0 0 6px ${s.color}88"></div>
      <span>${s.name}</span>
      <span class="src-live">LIVE</span>
    </div>`).join('');
}
renderSources();

// ── CONVERSATION HISTORY ──
function saveConv(question, answer) {
  const id = Date.now();
  const short = question.substring(0, 40) + (question.length > 40 ? '…' : '');
  const now = new Date();
  const time = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
  conversations.unshift({ id, short, time, question, answer });
  activeConvId = id;
  renderHistory();
}

function renderHistory() {
  const nav = document.getElementById('sidebarNav');
  if (conversations.length === 0) {
    nav.innerHTML = `<div style="font-size:11px;color:var(--text-30);padding:14px 14px 4px;">Anko pa gen konvèsasyon.</div>`;
    return;
  }
  nav.innerHTML = `<div class="nav-section-label">Istwa Konvèsasyon</div>` +
    conversations.slice(0,12).map(c => `
      <div class="conv-item ${c.id === activeConvId ? 'active':''}" onclick="loadConv(${c.id})">
        <span class="conv-icon">💬</span>
        <span class="conv-text">${c.short}</span>
        <span class="conv-time">${c.time}</span>
      </div>`).join('');
}
renderHistory();

function loadConv(id) {
  const c = conversations.find(x => x.id === id);
  if (!c) return;
  activeConvId = id;
  renderHistory();
  const container = document.getElementById('chatMessages');
  container.innerHTML = '';
  addMessage('user', `<p>${c.question.replace(/</g,'&lt;')}</p>`);
  addMessage('ai', c.answer);
  closeSidebar();
}

// ── APIs ──
async function searchWiki(q, lang='fr') {
  try {
    const r = await fetch(`https://${lang}.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(q)}`);
    if (r.ok) { const d = await r.json(); if(d.extract) return { text:d.extract.substring(0,700), source:`Wikipedia ${lang.toUpperCase()}`, color:'#4ade80' }; }
  } catch(e){}; return null;
}

async function searchDuck(q) {
  try {
    const r = await fetch(`https://api.duckduckgo.com/?q=${encodeURIComponent(q)}&format=json&no_html=1`);
    const d = await r.json();
    if (d.AbstractText) return { text:d.AbstractText.substring(0,500), source:'DuckDuckGo', color:'#facc15' };
  } catch(e){}; return null;
}

async function getWeather(city) {
  try {
    const geo = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&format=json`);
    const gD = await geo.json();
    if (!gD.results?.[0]) return null;
    const { latitude, longitude, name, country } = gD.results[0];
    const w = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current_weather=true&hourly=relative_humidity_2m&timezone=auto`);
    const wD = await w.json();
    const cw = wD.current_weather;
    const codes = {0:'☀️ Syèl klè',1:'🌤️ Prèske klè',2:'⛅ Pasyèl nwaj',3:'☁️ Kouvri',45:'🌫️ Bwouya',51:'🌦️ Lapli fèb',61:'🌧️ Lapli',80:'⛈️ Lapli rapid',95:'⛈️ Lotaj'};
    const cond = codes[cw.weathercode] || '🌡️';
    return { text:`📍 **${name}, ${country}**\n🌡️ Tanperati: **${cw.temperature}°C**\n${cond}\n💨 Van: ${cw.windspeed} km/h`, source:'Open-Meteo', color:'#38bdf8' };
  } catch(e){ return null; }
}

async function getCurrency() {
  try {
    const r = await fetch('https://open.er-api.com/v6/latest/USD');
    const d = await r.json();
    const htg = d.rates?.HTG?.toFixed(2);
    const eur = (1/d.rates?.EUR)?.toFixed(4);
    return { text:`💵 **1 USD = ${htg} HTG**\n💶 1 EUR = ${eur} USD\n📊 Sous: ExchangeRate-API (Tan reyèl)`, source:'ExchangeRate', color:'#38bdf8' };
  } catch(e){ return null; }
}

async function getCrypto(coin='bitcoin') {
  try {
    const r = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${coin}&vs_currencies=usd,eur`);
    const d = await r.json();
    if (d[coin]) return { text:`₿ **${coin.charAt(0).toUpperCase()+coin.slice(1)}**: $${d[coin].usd?.toLocaleString()} USD / €${d[coin].eur?.toLocaleString()} EUR`, source:'CoinGecko', color:'#10b981' };
  } catch(e){}; return null;
}

async function searchArXiv(q) {
  try {
    const r = await fetch(`https://export.arxiv.org/api/query?search_query=all:${encodeURIComponent(q)}&max_results=1`);
    const xml = new DOMParser().parseFromString(await r.text(),'text/xml');
    const e = xml.querySelector('entry');
    if (e) { const title=e.querySelector('title')?.textContent?.trim(); const sum=e.querySelector('summary')?.textContent?.trim().substring(0,300); return { text:`📄 **${title}**\n${sum}`, source:'arXiv', color:'#a78bfa' }; }
  } catch(e){}; return null;
}

async function searchPubMed(q) {
  try {
    const r = await fetch(`https://eutils.ncbi.nlm.nih.gov/entrez/eutils/esearch.fcgi?db=pubmed&term=${encodeURIComponent(q)}&retmax=3&format=json`);
    const d = await r.json(); const cnt = d.esearchresult?.count;
    if (cnt > 0) return { text:`💊 **${cnt} atik medikal** sou "${q}" nan PubMed.\nIDlist: ${d.esearchresult.idlist?.join(', ')}`, source:'PubMed', color:'#f43f5e' };
  } catch(e){}; return null;
}

function dec(h) { const el=document.createElement('textarea'); el.innerHTML=h; return el.value; }

// ── CLAUDE AI (via Anthropic API) ──
async function askClaude(question, contextData) {
  try {
    // Build context from real API results
    const ctxParts = Object.values(contextData)
      .filter(v => v?.text)
      .map(v => `[${v.source}]: ${v.text}`)
      .join('\n\n');

    const systemPrompt = `Ou se FAST v4, yon asistan entèlijan ki pale Kreyòl ayisyen, fransè, ak anglè natirèlman. 
Ou gen aksè a plizyè sous enfòmasyon tankou Wikipedia, meteo, finans, syans, fim, ak plis ankò.
Objektif ou se bay repons klè, itil, epi chalè pou moun ki poze kesyon.

Règ:
- Toujou reponn nan menm lang moun nan pale (kreyòl, fransè, oswa anglè)
- Si ou gen done reyèl nan kontèks la, itilize yo epi eksplike yo klèman
- Bay eksplikasyon ki senp, pratik, epi ede moun konprann
- Si kesyon an sou sante, fin, oswa legal — bay enfò jeneral epi di yo konsèlte yon pwofesyonèl
- Soyez chalè, enkourajante, epi toujou itil`;

    const userContent = ctxParts
      ? `Mwen bezwen konnen: ${question}\n\nDone mwen jwenn:\n${ctxParts}\n\nBay mwen yon repons klè epi itil.`
      : `Mwen bezwen konnen: ${question}\n\nReponn direkteman avèk tout konesans ou.`;

    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        system: systemPrompt,
        messages: [{ role: 'user', content: userContent }]
      })
    });

    if (resp.ok) {
      const data = await resp.json();
      const text = data.content?.map(b => b.text || '').join('');
      if (text) return { text, source: 'Claude AI', color: '#a78bfa', isPrimary: true };
    }
  } catch(e) {}
  return null;
}

// ── ORCHESTRATOR ──
async function fullSearch(question) {
  const ql = question.toLowerCase();
  const tasks = {};

  // Toujou kouri
  tasks.wiki_fr = searchWiki(ql, 'fr');
  tasks.wiki_en = searchWiki(ql, 'en');
  tasks.duck    = searchDuck(ql);

  // Entansyon deteksyon
  if (/météo|meteo|tan|weather|klima|tanperati|temperature|lapli|van/i.test(ql)) {
    const city = ql.replace(/météo|meteo|weather|tan|klima|tanperati|lapli|an|nan|sou|pou|temperature/gi,'').trim() || 'Port-au-Prince';
    tasks.weather = getWeather(city);
  }
  if (/taux|deviz|dollar|usd|eur|htg|monnaie|lajan|echanj/i.test(ql)) tasks.currency = getCurrency();
  if (/bitcoin|btc|eth|ethereum|crypto|krypto|bnb|solana/i.test(ql)) {
    const coin = ql.match(/bitcoin|ethereum|bnb|solana/i)?.[0]?.toLowerCase() || 'bitcoin';
    tasks.crypto = getCrypto(coin);
  }
  if (/arxiv|academic|syantifik|rechèch|scientifique/i.test(ql)) tasks.arxiv = searchArXiv(ql);
  if (/santé|sante|medsin|medikal|maladie|pubmed|doktè/i.test(ql)) tasks.pubmed = searchPubMed(ql);
  if (/liv|livre|book|bibliyotèk|bibliyotek/i.test(ql)) { tasks.books = searchBooks(ql); tasks.openlibrary = searchOpenLib(ql); }
  if (/github|kòd|kode|code|repo|developer|pwogram/i.test(ql)) tasks.github = searchGitHub(ql);
  if (/definisyon|definition|signifye|signifi|vle di/i.test(ql)) {
    const word = ql.replace(/definisyon|definition|signifye|ki vle di|vle di/gi,'').trim();
    tasks.wikt = searchWikt(word);
  }
  if (/peyi|pays|country|nasyon/i.test(ql)) {
    const country = ql.replace(/peyi|pays|country|nasyon|kisa|ki jan|enfòmasyon|info/gi,'').trim();
    tasks.countries = searchCountry(country);
  }
  if (/fim|film|movie|sinema|seri|série/i.test(ql)) tasks.tmdb = searchTMDB(ql.replace(/fim|film|movie|sinema/gi,'').trim());
  if (/nasa|espas|space|planèt|etwal|galaksi/i.test(ql)) tasks.nasa = getNASA();
  if (/blag|blague|joke|dròl|ri mwen|amize/i.test(ql)) tasks.joke = getJoke();
  if (/sitasyon|quote|pwovèb|inspirasyon|motivasyon/i.test(ql)) tasks.quote = getQuote();
  if (/pwezi|poem|poetry|poet/i.test(ql)) tasks.poetry = getPoetry(ql.replace(/pwezi|poem|poetry/gi,'').trim()||'love');
  if (/trivia|quiz|kesyon jwèt|jeu/i.test(ql)) tasks.trivia = getTrivia();

  // Run all API calls in parallel first
  const rawResults = {};
  await Promise.allSettled(
    Object.entries(tasks).map(([k,p]) => p.then(v => { rawResults[k] = v; }).catch(() => {}))
  );

  // Now ask Claude with all collected context
  const claudeResult = await askClaude(question, rawResults);
  if (claudeResult) rawResults.claude = claudeResult;

  return rawResults;
}

// ── RENDER ──
function fmt(t) {
  if (!t) return '';
  return t
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.*?)\*/g,'<em>$1</em>')
    .replace(/\n/g,'<br>');
}

function buildHTML(question, results) {
  const valid = Object.entries(results).filter(([,v]) => v?.text);
  if (valid.length === 0) {
    return `<span style="color:var(--text-60)">Pa gen rezilta pou <em>"${question}"</em>. Eseye: météo, taux dollar, bitcoin, film, trivia…</span>`;
  }

  let html = '';

  // Claude primary answer first
  const claude = results.claude;
  if (claude?.text) {
    html += `<div style="margin-bottom:12px;font-size:13.5px;line-height:1.7">${fmt(claude.text)}</div>
      <div style="height:1px;background:var(--border-1);margin:10px 0"></div>
      <div style="font-size:10px;color:var(--text-30);margin-bottom:8px">📡 Done jenere pa ${valid.filter(([k])=>k!=='claude').length} sous:</div>`;
  }

  // Other sources as compact cards
  for (const [key, val] of valid) {
    if (key === 'claude') continue;
    const color = val.color || '#4ade80';
    html += `<div class="src-card" style="border-color:${color}55">
      <div class="src-card-name" style="color:${color}">● ${val.source}</div>
      <div class="src-card-text">${fmt(val.text.substring(0,280))}</div>
    </div>`;
  }

  const names = valid.filter(([k])=>k!=='claude').map(([,v])=>v.source);
  if (names.length) {
    html += `<div class="badge-row">${names.map(n=>`<span class="badge">✓ ${n}</span>`).join('')}</div>`;
  }

  return html;
}

// ── MESSAGES ──
function addMessage(role, content) {
  const container = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = `message ${role}`;
  div.innerHTML = `<div class="avatar ${role==='user'?'av-user':'av-ai'}">${role==='user'?'👤':'⚡'}</div><div class="msg-bubble">${content}</div>`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function showTyping() {
  const container = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = 'message ai'; div.id = 'typingMsg';
  div.innerHTML = `<div class="avatar av-ai">⚡</div>
    <div class="msg-bubble">
      <div style="font-size:11px;color:var(--text-60);margin-bottom:6px">Ap chèche repons ou…</div>
      <div class="typing-dots"><span></span><span></span><span></span></div>
    </div>`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

// ── SEND ──
async function sendQuestion() {
  const input = document.getElementById('userInput');
  const q = input.value.trim();
  if (!q || isProcessing) return;
  isProcessing = true;
  document.getElementById('sendBtn').disabled = true;
  addMessage('user', `<p>${q.replace(/</g,'&lt;')}</p>`);
  input.value = ''; autoResize(input);

  showTyping();
  let results = {};
  try { results = await fullSearch(q); } catch(e) {}
  document.getElementById('typingMsg')?.remove();

  const html = buildHTML(q, results);
  addMessage('ai', html);
  saveConv(q, html);

  isProcessing = false;
  document.getElementById('sendBtn').disabled = false;
  input.focus();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendQuestion(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}
document.getElementById('userInput').addEventListener('input', function(){ autoResize(this); });
