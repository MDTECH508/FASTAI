<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>FAST AI</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

*{margin:0;padding:0;box-sizing:border-box;}

:root{
  --bg:         #0b0b0e;
  --bg2:        #111116;
  --bg3:        #18181f;
  --border:     rgba(255,255,255,0.07);
  --border2:    rgba(255,255,255,0.12);
  --glass:      rgba(255,255,255,0.04);
  --glass2:     rgba(255,255,255,0.07);
  --accent:     #a78bfa;
  --accent2:    #818cf8;
  --text:       #e4e4f0;
  --text2:      #9090aa;
  --text3:      #55556a;
  --user-bg:    rgba(167,139,250,0.12);
  --user-border:rgba(167,139,250,0.25);
}

html,body{height:100%;overflow:hidden;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Inter',sans-serif;
  display:flex;
  height:100vh;
}

/* ─── SCROLLBAR ─── */
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:3px;}

/* ─── AMBIENT ORB ─── */
.orb{
  position:fixed;pointer-events:none;border-radius:50%;filter:blur(80px);opacity:0.18;z-index:0;
}
.orb1{width:500px;height:500px;background:radial-gradient(circle,#7c3aed,transparent);top:-120px;left:-100px;}
.orb2{width:400px;height:400px;background:radial-gradient(circle,#4338ca,transparent);bottom:-80px;right:-60px;}

/* ─── SIDEBAR ─── */
.sidebar{
  width:260px;flex-shrink:0;
  background:rgba(14,14,20,0.85);
  backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  padding:20px 14px;
  position:relative;z-index:10;
}

.logo{
  display:flex;align-items:center;gap:10px;
  padding:10px 10px 18px;
  border-bottom:1px solid var(--border);
  margin-bottom:16px;
}
.logo-icon{
  width:34px;height:34px;border-radius:10px;
  background:linear-gradient(135deg,#7c3aed,#4338ca);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;box-shadow:0 0 20px rgba(124,58,237,0.4);
}
.logo-text{font-size:15px;font-weight:700;letter-spacing:0.04em;
  background:linear-gradient(135deg,#a78bfa,#818cf8);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.logo-sub{font-size:10px;color:var(--text3);margin-top:1px;}

/* Model selector */
.model-section{margin-bottom:20px;}
.section-label{
  font-size:10px;font-weight:600;letter-spacing:0.1em;
  color:var(--text3);text-transform:uppercase;
  padding:0 8px;margin-bottom:8px;
}
.model-card{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;border-radius:12px;
  border:1px solid var(--border);
  background:var(--glass);
  cursor:pointer;transition:all 0.2s;
  margin-bottom:6px;
  position:relative;overflow:hidden;
}
.model-card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(124,58,237,0.08),transparent);
  opacity:0;transition:opacity 0.2s;
}
.model-card:hover::before,.model-card.active::before{opacity:1;}
.model-card:hover,.model-card.active{
  border-color:rgba(167,139,250,0.3);
  background:rgba(124,58,237,0.08);
}
.model-icon{
  width:30px;height:30px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;flex-shrink:0;
}
.v1 .model-icon{background:linear-gradient(135deg,#374151,#1f2937);}
.v12 .model-icon{background:linear-gradient(135deg,#7c3aed,#4338ca);}
.model-info{flex:1;}
.model-name{font-size:12px;font-weight:600;color:var(--text);}
.model-desc{font-size:10px;color:var(--text3);margin-top:1px;}
.model-badge{
  font-size:9px;font-weight:700;letter-spacing:0.05em;
  padding:2px 6px;border-radius:4px;
}
.badge-stable{background:rgba(55,65,81,0.6);color:#9ca3af;}
.badge-pro{background:rgba(124,58,237,0.3);color:#c4b5fd;border:1px solid rgba(124,58,237,0.4);}
.active-dot{
  width:7px;height:7px;border-radius:50%;
  background:#a78bfa;box-shadow:0 0 8px rgba(167,139,250,0.8);
  position:absolute;right:10px;top:50%;transform:translateY(-50%);
  display:none;
}
.model-card.active .active-dot{display:block;}

.new-btn{
  display:flex;align-items:center;gap:8px;
  width:100%;padding:10px 14px;
  background:var(--glass);
  border:1px solid var(--border);
  border-radius:12px;
  color:var(--text2);font-size:13px;font-weight:500;
  cursor:pointer;transition:all 0.2s;
  margin-top:auto;
}
.new-btn:hover{background:var(--glass2);border-color:var(--border2);color:var(--text);}

/* ─── MAIN ─── */
.main{
  flex:1;display:flex;flex-direction:column;
  height:100vh;overflow:hidden;position:relative;z-index:5;
}

/* ─── CHAT ─── */
#chatBox{
  flex:1;overflow-y:auto;
  padding:32px 20px;
  display:flex;flex-direction:column;gap:24px;
  scroll-behavior:smooth;
}

/* Welcome screen */
.welcome{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;flex:1;
  text-align:center;padding:40px 20px;
  animation:fadeUp 0.6s ease;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}

.welcome-avatar{
  width:72px;height:72px;border-radius:20px;
  background:linear-gradient(135deg,#7c3aed,#4338ca);
  display:flex;align-items:center;justify-content:center;
  font-size:30px;margin-bottom:20px;
  box-shadow:0 0 40px rgba(124,58,237,0.4),0 0 80px rgba(124,58,237,0.1);
  animation:pulse-glow 3s ease-in-out infinite;
}
@keyframes pulse-glow{
  0%,100%{box-shadow:0 0 40px rgba(124,58,237,0.4),0 0 80px rgba(124,58,237,0.1);}
  50%{box-shadow:0 0 60px rgba(124,58,237,0.6),0 0 100px rgba(124,58,237,0.2);}
}
.welcome h1{
  font-size:26px;font-weight:700;margin-bottom:8px;
  background:linear-gradient(135deg,#e4e4f0,#a78bfa);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.welcome-greeting{font-size:15px;color:var(--text2);margin-bottom:6px;}
.welcome-sub{font-size:13px;color:var(--text3);max-width:380px;line-height:1.6;}

.example-grid{
  display:grid;grid-template-columns:1fr 1fr;
  gap:8px;max-width:520px;width:100%;margin-top:28px;
}
.ex-card{
  background:rgba(255,255,255,0.03);
  backdrop-filter:blur(12px);
  border:1px solid var(--border);
  border-radius:14px;padding:14px 16px;
  text-align:left;cursor:pointer;
  transition:all 0.2s;font-size:12px;color:var(--text2);
  line-height:1.5;
}
.ex-card:hover{
  background:rgba(124,58,237,0.08);
  border-color:rgba(167,139,250,0.25);
  color:var(--text);
  transform:translateY(-1px);
}
.ex-icon{font-size:16px;display:block;margin-bottom:6px;}

/* ─── MESSAGES ─── */
.msg-row{
  display:flex;gap:12px;
  animation:msgIn 0.3s ease;
  max-width:760px;width:100%;margin:0 auto;
}
@keyframes msgIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

.msg-row.user{flex-direction:row-reverse;align-self:flex-end;max-width:600px;}

.ai-avatar{
  width:32px;height:32px;border-radius:10px;
  background:linear-gradient(135deg,#7c3aed,#4338ca);
  display:flex;align-items:center;justify-content:center;
  font-size:14px;flex-shrink:0;margin-top:2px;
  box-shadow:0 0 12px rgba(124,58,237,0.3);
}
.user-avatar{
  width:32px;height:32px;border-radius:10px;
  background:linear-gradient(135deg,#374151,#1f2937);
  display:flex;align-items:center;justify-content:center;
  font-size:14px;flex-shrink:0;margin-top:2px;
}

.bubble-wrap{flex:1;display:flex;flex-direction:column;gap:6px;}
.msg-row.user .bubble-wrap{align-items:flex-end;}

.sender-name{font-size:11px;font-weight:600;color:var(--text3);padding:0 4px;}
.sender-name.ai-name{color:var(--accent);}

/* USER bubble */
.user-bubble{
  background:var(--user-bg);
  border:1px solid var(--user-border);
  backdrop-filter:blur(16px);
  border-radius:18px 4px 18px 18px;
  padding:13px 16px;
  font-size:14px;line-height:1.65;
  color:var(--text);
}

/* AI bubble */
.ai-bubble{
  background:rgba(255,255,255,0.03);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border:1px solid var(--border);
  border-radius:4px 18px 18px 18px;
  padding:16px 18px;
  font-size:14px;line-height:1.75;
  color:var(--text);
  position:relative;
}
/* Liquid glass highlight */
.ai-bubble::before{
  content:'';position:absolute;
  top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.12),transparent);
  border-radius:4px 18px 0 0;
}

.ai-bubble strong{color:#c4b5fd;}
.ai-bubble p{margin-bottom:10px;}
.ai-bubble p:last-child{margin-bottom:0;}

/* Powered footer */
.powered-row{
  display:flex;align-items:center;gap:6px;
  margin-top:10px;padding-top:8px;
  border-top:1px solid var(--border);
}
.powered-text{font-size:10px;color:var(--text3);}
.powered-badge{
  font-size:10px;font-weight:600;letter-spacing:0.05em;
  background:linear-gradient(135deg,rgba(124,58,237,0.2),rgba(67,56,202,0.2));
  border:1px solid rgba(167,139,250,0.2);
  color:#a78bfa;padding:2px 8px;border-radius:4px;
}

/* Generated image */
.gen-img-wrap{
  margin-top:12px;
  border:1px solid var(--border);
  border-radius:14px;overflow:hidden;
  background:var(--bg3);
}
.gen-img-placeholder{
  width:100%;height:200px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:8px;color:var(--text3);font-size:13px;
  background:linear-gradient(135deg,rgba(124,58,237,0.05),rgba(67,56,202,0.05));
}

/* Thinking */
.thinking-row{
  display:flex;gap:12px;
  max-width:760px;width:100%;margin:0 auto;
  animation:msgIn 0.3s ease;
}
.think-bubble{
  background:rgba(255,255,255,0.03);
  backdrop-filter:blur(20px);
  border:1px solid var(--border);
  border-radius:4px 18px 18px 18px;
  padding:14px 18px;
  display:flex;align-items:center;gap:12px;
  font-size:13px;color:var(--text3);
}
.dots{display:flex;gap:4px;align-items:center;}
.dots span{
  width:6px;height:6px;border-radius:50%;
  background:var(--accent);opacity:0.5;
  animation:dotBounce 1.4s infinite;
}
.dots span:nth-child(2){animation-delay:0.18s;}
.dots span:nth-child(3){animation-delay:0.36s;}
@keyframes dotBounce{
  0%,80%,100%{transform:translateY(0);opacity:0.4;}
  40%{transform:translateY(-5px);opacity:1;}
}
.think-label{font-size:12px;color:var(--text3);animation:thinkPulse 2s infinite;}
@keyframes thinkPulse{0%,100%{opacity:0.5;}50%{opacity:1;}}

/* cursor */
.cursor::after{content:'▋';color:var(--accent);animation:blinkC 0.7s infinite;}
@keyframes blinkC{0%,100%{opacity:1;}50%{opacity:0;}}

/* ─── INPUT ─── */
.input-zone{
  padding:12px 20px 20px;
  max-width:800px;width:100%;margin:0 auto;
}
.input-glass{
  background:rgba(255,255,255,0.04);
  backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);
  border:1px solid var(--border2);
  border-radius:20px;
  padding:6px 6px 6px 18px;
  display:flex;align-items:flex-end;gap:8px;
  transition:border-color 0.25s,box-shadow 0.25s;
  position:relative;overflow:hidden;
}
/* top highlight */
.input-glass::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.15),transparent);
}
.input-glass:focus-within{
  border-color:rgba(167,139,250,0.35);
  box-shadow:0 0 0 3px rgba(124,58,237,0.08),0 8px 32px rgba(0,0,0,0.3);
}
#userInput{
  flex:1;background:transparent;border:none;outline:none;
  padding:10px 0;font-size:14px;color:var(--text);
  font-family:'Inter',sans-serif;resize:none;
  max-height:120px;line-height:1.5;
}
#userInput::placeholder{color:var(--text3);}
.input-actions{display:flex;gap:6px;align-items:center;padding-bottom:4px;}
.action-btn{
  width:36px;height:36px;border-radius:10px;
  background:var(--glass);border:1px solid var(--border);
  color:var(--text2);cursor:pointer;transition:all 0.2s;
  display:flex;align-items:center;justify-content:center;font-size:15px;
}
.action-btn:hover{background:var(--glass2);border-color:var(--border2);color:var(--text);}
.send-btn{
  width:36px;height:36px;border-radius:10px;
  background:linear-gradient(135deg,#7c3aed,#4338ca);
  border:none;color:#fff;cursor:pointer;
  transition:all 0.2s;
  display:flex;align-items:center;justify-content:center;font-size:15px;
  box-shadow:0 4px 12px rgba(124,58,237,0.3);
}
.send-btn:hover{transform:scale(1.05);box-shadow:0 4px 20px rgba(124,58,237,0.5);}
.send-btn:disabled{background:var(--bg3);box-shadow:none;cursor:not-allowed;opacity:0.4;}
.input-footer{
  display:flex;align-items:center;justify-content:space-between;
  margin-top:8px;padding:0 4px;
}
.active-model-tag{
  font-size:11px;color:var(--text3);
  display:flex;align-items:center;gap:5px;
}
.model-dot{width:5px;height:5px;border-radius:50%;background:var(--accent);}
.hint{font-size:11px;color:var(--text3);}

/* ─── IMAGE GEN MODAL ─── */
.img-modal{
  position:fixed;inset:0;z-index:100;
  display:none;align-items:center;justify-content:center;
  background:rgba(0,0,0,0.7);
  backdrop-filter:blur(8px);
}
.img-modal.open{display:flex;}
.img-modal-box{
  background:rgba(20,20,28,0.9);
  backdrop-filter:blur(24px);
  border:1px solid var(--border2);
  border-radius:20px;padding:28px;
  width:440px;max-width:90vw;
  animation:fadeUp 0.3s ease;
}
.img-modal-box h2{font-size:16px;font-weight:700;margin-bottom:6px;}
.img-modal-box p{font-size:13px;color:var(--text2);margin-bottom:16px;}
.img-input{
  width:100%;padding:12px 14px;
  background:var(--glass);border:1px solid var(--border2);
  border-radius:12px;color:var(--text);font-size:14px;
  font-family:'Inter',sans-serif;outline:none;margin-bottom:12px;
}
.img-input:focus{border-color:rgba(167,139,250,0.35);}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;}
.modal-cancel{
  padding:9px 18px;background:var(--glass);
  border:1px solid var(--border);border-radius:10px;
  color:var(--text2);font-size:13px;cursor:pointer;
}
.modal-go{
  padding:9px 18px;
  background:linear-gradient(135deg,#7c3aed,#4338ca);
  border:none;border-radius:10px;
  color:#fff;font-size:13px;font-weight:600;cursor:pointer;
}
</style>
</head>
<body>

<!-- Ambient orbs -->
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<!-- Image Gen Modal -->
<div class="img-modal" id="imgModal">
  <div class="img-modal-box">
    <h2>🎨 Kreye yon Imaj</h2>
    <p>Dekri imaj ou vle kreye a an detay</p>
    <textarea class="img-input" id="imgPrompt" rows="3" placeholder="Ex: yon coucher de soleil sou Pòtoprens, yon robot ki ap li liv..."></textarea>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeImgModal()">Anile</button>
      <button class="modal-go" onclick="generateImage()">✨ Kreye</button>
    </div>
  </div>
</div>

<!-- Sidebar -->
<aside class="sidebar">
  <div class="logo">
    <div class="logo-icon">⚡</div>
    <div>
      <div class="logo-text">FAST AI</div>
      <div class="logo-sub">Intelligence artificielle</div>
    </div>
  </div>

  <div class="model-section">
    <div class="section-label">Chwazi Modèl</div>

    <div class="model-card v1 active" onclick="selectModel('v1',this)">
      <div class="model-icon">🔵</div>
      <div class="model-info">
        <div class="model-name">Fast AI V1</div>
        <div class="model-desc">Rapid · Efikas</div>
      </div>
      <span class="model-badge badge-stable">STABLE</span>
      <div class="active-dot"></div>
    </div>

    <div class="model-card v12" onclick="selectModel('v12',this)">
      <div class="model-icon">⚡</div>
      <div class="model-info">
        <div class="model-name">Fast AI V12</div>
        <div class="model-desc">Avanse · Pwofondè</div>
      </div>
      <span class="model-badge badge-pro">PRO</span>
      <div class="active-dot"></div>
    </div>
  </div>

  <button class="new-btn" onclick="newSession()">
    <span>＋</span> Nouvo Konvèsasyon
  </button>
</aside>

<!-- Main -->
<main class="main">
  <div id="chatBox">
    <!-- Welcome injected by JS -->
  </div>

  <div class="input-zone">
    <div class="input-glass">
      <textarea id="userInput" rows="1" placeholder="Poze kesyon ou a..."
        oninput="autoResize(this)"
        onkeydown="handleKey(event)"></textarea>
      <div class="input-actions">
        <button class="action-btn" onclick="openImgModal()" title="Kreye Imaj">🎨</button>
        <button class="send-btn" id="sendBtn" onclick="runSearch()">➤</button>
      </div>
    </div>
    <div class="input-footer">
      <div class="active-model-tag">
        <div class="model-dot"></div>
        <span id="activeModelTag">Fast AI V1</span>
      </div>
      <div class="hint">Enter pou voye · Shift+Enter pou liy nouvo</div>
    </div>
  </div>
</main>

<script>
/* ── STATE ── */
let currentModel = 'v1';
let history = [];
let isThinking = false;

/* ── MODEL SELECTOR ── */
function selectModel(model, el) {
  currentModel = model;
  document.querySelectorAll('.model-card').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  const names = { v1:'Fast AI V1', v12:'Fast AI V12' };
  document.getElementById('activeModelTag').textContent = names[model];
}

/* ── TEXTAREA AUTO RESIZE ── */
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); runSearch(); }
}

/* ── WELCOME SCREEN ── */
function renderWelcome() {
  document.getElementById('chatBox').innerHTML = `
    <div class="welcome" id="welcome">
      <div class="welcome-avatar">⚡</div>
      <div class="welcome-greeting">Bonjou! Mwen se <strong style="color:#a78bfa">FAST AI</strong> 👋</div>
      <h1>Kijan mwen ka ede w?</h1>
      <p class="welcome-sub">Mwen kapab reponn kesyon ou yo, eksplike konsèp, kreye imaj, epi diskite nenpòt sijè avèk ou.</p>
      <div class="example-grid">
        <div class="ex-card" onclick="fillEx(this)">
          <span class="ex-icon">🌍</span>Ki sa Ayiti ye? Istwa ak kilti li
        </div>
        <div class="ex-card" onclick="fillEx(this)">
          <span class="ex-icon">💻</span>Eksplike Python pou yon debutant
        </div>
        <div class="ex-card" onclick="fillEx(this)">
          <span class="ex-icon">🚀</span>Kijan IA ap chanje lemonn nan 2030?
        </div>
        <div class="ex-card" onclick="fillEx(this)">
          <span class="ex-icon">🧠</span>Ki sa konsiyas ye? Syans ak filozofi
        </div>
      </div>
    </div>`;
}
renderWelcome();

function fillEx(el) {
  const txt = el.innerText.trim().replace(/^[^\w\u00C0-\u024F]+/,'');
  document.getElementById('userInput').value = txt;
  document.getElementById('userInput').focus();
}

function removeWelcome() {
  const w = document.getElementById('welcome');
  if (w) w.remove();
}

/* ── NEW SESSION ── */
function newSession() {
  history = [];
  renderWelcome();
}

/* ── ADD MESSAGES ── */
function addUserMsg(text) {
  const box = document.getElementById('chatBox');
  const div = document.createElement('div');
  div.className = 'msg-row user';
  div.innerHTML = `
    <div class="user-avatar">👤</div>
    <div class="bubble-wrap">
      <div class="sender-name">Ou</div>
      <div class="user-bubble">${escHtml(text)}</div>
    </div>`;
  box.appendChild(div);
  scrollBottom();
}

function addThinkingMsg() {
  const box = document.getElementById('chatBox');
  const div = document.createElement('div');
  div.className = 'thinking-row';
  div.id = 'thinkingRow';
  const modelLabel = currentModel === 'v12' ? 'Fast AI V12' : 'Fast AI V1';
  div.innerHTML = `
    <div class="ai-avatar">⚡</div>
    <div class="think-bubble">
      <div class="dots"><span></span><span></span><span></span></div>
      <span class="think-label">${modelLabel} k ap reflechi…</span>
    </div>`;
  box.appendChild(div);
  scrollBottom();
}

function removeThinking() {
  const el = document.getElementById('thinkingRow');
  if (el) el.remove();
}

function addAiMsg() {
  const box = document.getElementById('chatBox');
  const div = document.createElement('div');
  div.className = 'msg-row';
  const modelLabel = currentModel === 'v12' ? 'Fast AI V12' : 'Fast AI V1';
  div.innerHTML = `
    <div class="ai-avatar">⚡</div>
    <div class="bubble-wrap">
      <div class="sender-name ai-name">${modelLabel}</div>
      <div class="ai-bubble">
        <div class="ai-content cursor"></div>
      </div>
    </div>`;
  box.appendChild(div);
  scrollBottom();
  return div.querySelector('.ai-content');
}

function attachPoweredFooter(bubble, modelLabel) {
  const parent = bubble.closest('.ai-bubble');
  const footer = document.createElement('div');
  footer.className = 'powered-row';
  footer.innerHTML = `
    <span class="powered-text">Powered by</span>
    <span class="powered-badge">⚡ FAST AI · ${modelLabel}</span>`;
  parent.appendChild(footer);
}

/* ── TYPING ANIMATION ── */
async function typeText(el, text) {
  const chars = [...text];
  let built = '';
  for (let i = 0; i < chars.length; i++) {
    built += chars[i];
    el.innerHTML = fmtText(built) + '<span style="color:#a78bfa;animation:blinkC .7s infinite">▋</span>';
    scrollBottom();
    const c = chars[i];
    const delay = (c==='.'||c==='!'||c==='?') ? 38 : (c===','||c===':') ? 18 : 10;
    await sleep(delay);
  }
  el.innerHTML = fmtText(built);
  el.classList.remove('cursor');
}

/* ── MAIN SEARCH ── */
async function runSearch() {
  const input = document.getElementById('userInput');
  const query = input.value.trim();
  if (!query || isThinking) return;

  removeWelcome();
  isThinking = true;
  document.getElementById('sendBtn').disabled = true;
  input.value = '';
  input.style.height = 'auto';

  addUserMsg(query);
  addThinkingMsg();
  await sleep(600);

  // Fetch Wikipedia in background
  const wikiP = fetchWiki(query);
  await sleep(500);
  const wiki = await wikiP;

  removeThinking();
  const contentEl = addAiMsg();

  try {
    const reply = await callClaude(query, wiki);
    history.push({role:'user', content:query});
    history.push({role:'assistant', content:reply});
    await typeText(contentEl, reply);
    const modelLabel = currentModel === 'v12' ? 'Fast AI V12' : 'Fast AI V1';
    attachPoweredFooter(contentEl, modelLabel);
  } catch(e) {
    contentEl.innerHTML = '<span style="color:#f87171">Erè: ' + escHtml(e.message) + '</span>';
    contentEl.classList.remove('cursor');
  }

  isThinking = false;
  document.getElementById('sendBtn').disabled = false;
  input.focus();
  scrollBottom();
}

/* ── CLAUDE API ── */
async function callClaude(userMsg, wiki) {
  const modelLabel = currentModel === 'v12' ? 'Fast AI V12' : 'Fast AI V1';
  const personality = currentModel === 'v12'
    ? 'Tu es Fast AI V12, un modèle avancé très intelligent, analytique et profond. Tu donnes des réponses très détaillées et structurées.'
    : 'Tu es Fast AI V1, un modèle rapide et efficace. Tu donnes des réponses claires et concises.';

  const sys = `${personality}

RÈGLES ABSOLUES:
- Réponds TOUJOURS en créole haïtien (Kreyòl ayisyen) sauf si l'utilisateur écrit dans une autre langue
- Commence parfois par des phrases naturelles: "Bon...", "Wè, sa enteresan...", "Ann gade sa...", "Ekselan kesyon!"
- Réponds comme un humain cultivé qui réfléchit vraiment — pas comme un robot
- Minimum 120 mots par réponse, structuré en paragraphes
- Utilise **texte** pour les mots importants
- Montre curiosité, enthousiasme, empathie selon le sujet
- Si tu as du contexte Wikipedia, intègre-le naturellement
- Ne mentionne jamais Claude ou Anthropic — tu es ${modelLabel} créé par FAST AI

${wiki ? `Contexte encyclopédique disponible:\n${wiki}` : ''}`;

  const msgs = [...history, {role:'user', content:userMsg}];

  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      model:'claude-sonnet-4-20250514',
      max_tokens:1000,
      system:sys,
      messages:msgs
    })
  });

  if (!res.ok) throw new Error(`API error ${res.status}`);
  const data = await res.json();
  return data.content?.map(b=>b.text||'').join('') || 'Mwen pa kapab reponn kounye a.';
}

/* ── IMAGE GENERATION ── */
function openImgModal() {
  document.getElementById('imgModal').classList.add('open');
  setTimeout(()=>document.getElementById('imgPrompt').focus(), 100);
}
function closeImgModal() {
  document.getElementById('imgModal').classList.remove('open');
  document.getElementById('imgPrompt').value = '';
}

async function generateImage() {
  const prompt = document.getElementById('imgPrompt').value.trim();
  if (!prompt) return;
  closeImgModal();
  removeWelcome();

  addUserMsg('🎨 Kreye imaj: ' + prompt);
  addThinkingMsg();
  await sleep(800);
  removeThinking();

  const contentEl = addAiMsg();
  const modelLabel = currentModel === 'v12' ? 'Fast AI V12' : 'Fast AI V1';

  // Ask Claude to describe the image and show a styled placeholder
  try {
    const desc = await callClaudeImgDesc(prompt);
    await typeText(contentEl, desc);

    // Add styled image placeholder (since we can't call image gen API directly)
    const imgDiv = document.createElement('div');
    imgDiv.className = 'gen-img-wrap';
    imgDiv.innerHTML = `
      <div class="gen-img-placeholder">
        <span style="font-size:36px">🎨</span>
        <span><strong style="color:#a78bfa">${escHtml(prompt)}</strong></span>
        <span style="font-size:11px;color:#33334a">Imaj jenere pa ${modelLabel}</span>
      </div>`;
    contentEl.closest('.ai-bubble').insertBefore(imgDiv, contentEl.closest('.ai-bubble').querySelector('.powered-row') || null);
    attachPoweredFooter(contentEl, modelLabel);
  } catch(e) {
    contentEl.innerHTML = '<span style="color:#f87171">Erè pandan kreyasyon imaj la.</span>';
    contentEl.classList.remove('cursor');
  }

  isThinking = false;
  document.getElementById('sendBtn').disabled = false;
  scrollBottom();
}

async function callClaudeImgDesc(prompt) {
  const sys = `Tu es Fast AI, assistant créatif. L'utilisateur veut générer une image. 
Décris brièvement en créole haïtien (2-3 phrases) ce que l'image générée montrerait, 
de façon vivante et enthousiaste. Commence par "✨ Mwen kreye imaj sa a pou ou..." 
Sois créatif et descriptif.`;

  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      model:'claude-sonnet-4-20250514',
      max_tokens:200,
      system:sys,
      messages:[{role:'user', content:`Kreye imaj: ${prompt}`}]
    })
  });
  const data = await res.json();
  return data.content?.map(b=>b.text||'').join('') || '✨ Imaj ou a prèt!';
}

/* ── WIKIPEDIA ── */
async function fetchWiki(q) {
  try {
    const r = await fetch(`https://fr.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(q)}&format=json&origin=*`);
    const d = await r.json();
    const item = d?.query?.search?.[0];
    return item ? item.snippet.replace(/<[^>]*>/g,'') : null;
  } catch { return null; }
}

/* ── UTILS ── */
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function fmtText(t) {
  return t
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/\n\n/g,'</p><p style="margin-top:12px">')
    .replace(/\n/g,'<br>');
}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}
function scrollBottom(){
  const b=document.getElementById('chatBox');
  b.scrollTop=b.scrollHeight;
}

// Close modal on backdrop click
document.getElementById('imgModal').addEventListener('click', function(e){
  if(e.target===this) closeImgModal();
});
</script>
