<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>FAST v4 — 20+ Sources + WhatsApp Bot</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;600;700&display=swap');
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-void: #04060d;
      --glass-1: rgba(12,18,32,0.65);
      --border-blue: rgba(82,140,255,0.2);
      --accent: #3b82f6;
      --accent2: #06b6d4;
      --accent3: #8b5cf6;
      --gold: #f59e0b;
      --text-bright: #eef2ff;
      --text-mid: #8fa3cc;
      --text-dim: #4a5a7a;
    }

    html, body { height: 100%; overflow: hidden; }
    body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg-void); color: var(--text-bright); }

    .orb { position: fixed; border-radius: 50%; pointer-events: none; z-index: 0; filter: blur(90px); }
    .orb1 { width:520px;height:520px; background:radial-gradient(circle,rgba(59,130,246,0.11),transparent 70%); top:-120px;left:-80px; }
    .orb2 { width:380px;height:380px; background:radial-gradient(circle,rgba(139,92,246,0.09),transparent 70%); bottom:-80px;right:-60px; }
    .orb3 { width:260px;height:260px; background:radial-gradient(circle,rgba(6,182,212,0.07),transparent 70%); top:40%;left:40%; }

    .app { display:flex; height:100vh; position:relative; z-index:1; }

    /* SIDEBAR */
    .sidebar {
      width:300px; flex-shrink:0;
      background:rgba(5,8,16,0.92);
      backdrop-filter:blur(30px) saturate(170%);
      border-right:1px solid var(--border-blue);
      display:flex; flex-direction:column;
      overflow-y:auto;
    }
    .brand-header { padding:20px 18px 16px; border-bottom:1px solid rgba(59,130,246,0.18); }
    .brand-row { display:flex;align-items:center;gap:11px;margin-bottom:10px; }
    .brand-icon { width:44px;height:44px; background:linear-gradient(135deg,#1d4ed8,#0891b2); border-radius:12px; display:flex;align-items:center;justify-content:center; font-size:21px; }
    .brand-name { font-family:'Space Grotesk',sans-serif; font-weight:700;font-size:18px; background:linear-gradient(135deg,#fff 30%,#7ab3ff); -webkit-background-clip:text;background-clip:text;color:transparent; }
    .powered-tag { display:inline-flex;align-items:center;gap:6px; background:rgba(245,158,11,0.12); border:1px solid rgba(245,158,11,0.3); border-radius:30px;padding:4px 10px; font-size:9.5px;font-weight:600; color:var(--gold); }

    .sidebar-body { flex:1;padding:14px; }
    .panel-label { font-size:9px;text-transform:uppercase;letter-spacing:1.8px; color:var(--text-dim);margin-bottom:8px;margin-top:8px; }
    
    .sources-grid { display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:14px; }
    .src-item { background:rgba(0,0,0,0.3); border:1px solid rgba(255,255,255,0.05); border-radius:8px; padding:6px 8px; font-size:10px; color:var(--text-mid); display:flex;align-items:center;gap:6px; }
    .src-dot{width:6px;height:6px;border-radius:50%;}
    .src-live{font-size:7px;background:rgba(74,222,128,0.12);border:1px solid rgba(74,222,128,0.35);color:#4ade80;border-radius:20px;padding:1px 4px;margin-left:auto;}

    /* WhatsApp QR Section */
    .wa-qr-section {
      background:linear-gradient(135deg,rgba(37,211,102,0.12),rgba(37,211,102,0.04));
      border:1px solid rgba(37,211,102,0.3);
      border-radius:16px;
      padding:14px;
      margin:10px 0;
      text-align:center;
    }
    .wa-qr-title { font-size:13px; font-weight:700; color:#25d366; margin-bottom:10px; display:flex;align-items:center;justify-content:center;gap:8px; }
    #qrcode { display:flex; justify-content:center; margin:12px 0; background:white; padding:10px; border-radius:12px; }
    .wa-pair-status { font-size:11px; color:var(--text-dim); margin-top:8px; }
    .wa-pair-status.connected { color:#25d366; }
    .wa-msg-input { display:flex; gap:6px; margin-top:12px; }
    .wa-msg-input input { flex:1; background:rgba(0,0,0,0.4); border:1px solid rgba(37,211,102,0.3); border-radius:20px; padding:8px 12px; font-size:11px; color:white; outline:none; }
    .wa-msg-input button { background:#25d366; border:none; border-radius:20px; padding:8px 12px; font-size:11px; font-weight:600; cursor:pointer; }

    .new-chat-btn { margin:14px; background:rgba(59,130,246,0.1); border:1px solid rgba(59,130,246,0.3); border-radius:40px; padding:11px; text-align:center; cursor:pointer; font-size:12.5px; }

    /* MAIN CHAT */
    .main-chat { flex:1;display:flex;flex-direction:column;overflow:hidden; }
    .topbar { padding:12px 22px; background:rgba(5,8,16,0.7); backdrop-filter:blur(20px); border-bottom:1px solid rgba(59,130,246,0.12); display:flex;align-items:center;gap:12px; }
    .chat-messages { flex:1;overflow-y:auto; padding:20px 24px; display:flex;flex-direction:column;gap:16px; scroll-behavior:smooth; }
    .message{display:flex;gap:11px;animation:msgIn 0.28s ease;}
    .message.user{flex-direction:row-reverse;}
    @keyframes msgIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
    .avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;}
    .av-user{background:linear-gradient(135deg,rgba(59,130,246,0.28),rgba(139,92,246,0.28));}
    .av-ai{background:linear-gradient(135deg,rgba(6,182,212,0.22),rgba(59,130,246,0.22));}
    .msg-bubble{max-width:75%;padding:12px 16px;font-size:13.5px;line-height:1.6;background:rgba(12,18,30,0.8);backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,0.065);border-radius:20px;}
    .message.user .msg-bubble{background:rgba(30,80,200,0.2);border:1px solid rgba(59,130,246,0.32);}
    .badge{display:inline-flex;align-items:center;gap:4px;font-size:9px;padding:2px 6px;border-radius:20px;margin:2px 2px 0 0;background:rgba(74,222,128,0.1);border:1px solid rgba(74,222,128,0.2);color:#4ade80;}

    .input-area{padding:14px 22px 26px;background:linear-gradient(to top,rgba(4,6,13,0.96) 0%,transparent 100%);}
    .input-glass{background:rgba(10,15,26,0.8);backdrop-filter:blur(26px);border:1px solid rgba(59,130,246,0.26);border-radius:54px;display:flex;align-items:flex-end;padding:8px 8px 8px 20px;gap:8px;}
    #userInput{flex:1;background:transparent;border:none;outline:none;color:var(--text-bright);font-size:14px;padding:11px 0;resize:none;font-family:inherit;}
    .send-btn{background:linear-gradient(135deg,#2563eb,#0891b2);border:none;width:44px;height:44px;border-radius:50%;cursor:pointer;color:white;font-size:17px;}
    .menu-toggle{display:none;position:fixed;bottom:18px;left:14px;background:rgba(10,15,26,0.92);border-radius:40px;padding:9px 15px;z-index:25;cursor:pointer;}
    @media(max-width:720px){ .sidebar{position:fixed;left:-300px;transition:left 0.27s;z-index:100;} .sidebar.open{left:0;} .menu-toggle{display:flex;} .msg-bubble{max-width:91%;} }
  </style>
</head>
<body>

<div class="orb orb1"></div><div class="orb orb2"></div><div class="orb orb3"></div>

<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="brand-header">
      <div class="brand-row">
        <div class="brand-icon">⚡</div>
        <div><div class="brand-name">FAST v4</div><div class="brand-version">20+ Sources · WhatsApp Bot</div></div>
      </div>
      <div class="powered-tag"><span>🇭🇹</span> ENTREPRISE TECH HAITIAN</div>
    </div>

    <div class="sidebar-body">
      <div class="panel-label">📡 20+ SOURCES AKTIF</div>
      <div class="sources-grid" id="sourcesGrid"></div>

      <!-- WhatsApp Bot Section with QR Code -->
      <div class="wa-qr-section">
        <div class="wa-qr-title"><span>📲</span> WhatsApp Bot — Paired</div>
        <div id="qrcode"></div>
        <div id="waStatus" class="wa-pair-status">🟢 Konekte via QR code</div>
        <div class="wa-msg-input">
          <input type="text" id="waTestMsg" placeholder="Tès mesaj sou WhatsApp...">
          <button onclick="sendTestWhatsApp()">Envoye</button>
        </div>
      </div>
    </div>

    <div class="new-chat-btn" id="newChatBtn">✨ Nouvo Konvèsasyon</div>
  </aside>

  <button class="menu-toggle" id="menuToggleBtn">☰ Menu</button>

  <main class="main-chat">
    <div class="topbar">
      <div>⚡</div>
      <div><div class="topbar-title">FAST v4 — 20+ Sources</div></div>
      <div style="margin-left:auto;font-size:10px;color:#4ade80;">✓ 20+ APIs aktive</div>
    </div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="input-area">
      <div class="input-glass">
        <textarea id="userInput" rows="1" placeholder="Poze kesyon ou… météo, news, devises, définitions, culture, santé, tech…" onkeydown="handleKey(event)"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendQuestion()">➤</button>
      </div>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<script>
// ═══════════════════════════════════════════════════════════════
// 20+ SOURCES KNOWLEDGE BASE + WHATSAPP BOT (PAIRED VIA QR)
// ═══════════════════════════════════════════════════════════════

let isProcessing = false;
let whatsAppClient = null;
let qrCodeGenerated = false;

// ==================== 20+ SOURCES ====================
const KNOWLEDGE_SOURCES = [
  { name: "📖 Wikipedia FR", emoji: "📖", color: "#4ade80", active: true, type: "wiki_fr" },
  { name: "📘 Wikipedia EN", emoji: "📘", color: "#4ade80", active: true, type: "wiki_en" },
  { name: "🔍 DuckDuckGo", emoji: "🔍", color: "#facc15", active: true, type: "duck" },
  { name: "📰 NewsAPI", emoji: "📰", color: "#fb923c", active: true, type: "news" },
  { name: "🌤️ Open-Meteo", emoji: "🌤️", color: "#38bdf8", active: true, type: "weather" },
  { name: "💱 ExchangeRate", emoji: "💱", color: "#38bdf8", active: true, type: "currency" },
  { name: "🎓 arXiv (Akademik)", emoji: "🎓", color: "#a78bfa", active: true, type: "arxiv" },
  { name: "💊 PubMed (Sante)", emoji: "💊", color: "#f43f5e", active: true, type: "pubmed" },
  { name: "📚 Google Books", emoji: "📚", color: "#fbbf24", active: true, type: "books" },
  { name: "🎬 TMDB (Fim)", emoji: "🎬", color: "#ec4899", active: true, type: "tmdb" },
  { name: "🎵 MusicBrainz", emoji: "🎵", color: "#8b5cf6", active: true, type: "music" },
  { name: "💻 GitHub", emoji: "💻", color: "#6b7280", active: true, type: "github" },
  { name: "🧠 Claude AI", emoji: "🧠", color: "#a78bfa", active: true, type: "claude" },
  { name: "📖 Wiktionary", emoji: "📖", color: "#10b981", active: true, type: "wiktionary" },
  { name: "🌍 RestCountries", emoji: "🌍", color: "#3b82f6", active: true, type: "countries" },
  { name: "🍲 Recipe (Spoonacular)", emoji: "🍲", color: "#f59e0b", active: true, type: "recipe" },
  { name: "🚗 OpenStreetMap", emoji: "🗺️", color: "#22c55e", active: true, type: "osm" },
  { name: "📈 Yahoo Finance", emoji: "📈", color: "#ef4444", active: true, type: "finance" },
  { name: "🎮 RAWG Games", emoji: "🎮", color: "#8b5cf6", active: true, type: "games" },
  { name: "🗣️ Urban Dictionary", emoji: "🗣️", color: "#f97316", active: true, type: "urban" }
];

// Afficher les sources dans la sidebar
function renderSources() {
  const grid = document.getElementById('sourcesGrid');
  if(!grid) return;
  grid.innerHTML = KNOWLEDGE_SOURCES.map(s => `
    <div class="src-item">
      <div class="src-dot" style="background:${s.color};box-shadow:0 0 5px ${s.color}"></div>
      <span style="font-size:10px;">${s.name}</span>
      <span class="src-live">LIVE</span>
    </div>
  `).join('');
}
renderSources();

// ==================== API CALLS ====================
async function searchWikipedia(query, lang='fr') {
  try {
    const url = `https://${lang}.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(query)}`;
    const r = await fetch(url);
    if(r.ok) {
      const d = await r.json();
      if(d.extract) return { text: d.extract.substring(0, 800), source: `Wikipedia ${lang.toUpperCase()}`, url: d.content_urls?.desktop?.page, badge: 'wiki' };
    }
  } catch(e) {}
  return null;
}

async function searchDuckDuckGo(query) {
  try {
    const r = await fetch(`https://api.duckduckgo.com/?q=${encodeURIComponent(query)}&format=json&no_html=1`);
    const d = await r.json();
    if(d.AbstractText) return { text: d.AbstractText.substring(0, 600), source: 'DuckDuckGo', url: d.AbstractURL, badge: 'duck' };
  } catch(e) {}
  return null;
}

async function getWeather(city) {
  try {
    const geo = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&format=json`);
    const geoD = await geo.json();
    if(!geoD.results?.[0]) return null;
    const { latitude, longitude, name, country } = geoD.results[0];
    const w = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current_weather=true`);
    const wD = await w.json();
    const cw = wD.current_weather;
    return { text: `📍 ${name}, ${country}\n🌡️ ${cw.temperature}°C\n💨 Vent: ${cw.windspeed} km/h`, source: 'Open-Meteo', badge: 'weather' };
  } catch(e) { return null; }
}

async function getExchangeRate() {
  try {
    const r = await fetch(`https://open.er-api.com/v6/latest/USD`);
    const d = await r.json();
    const usdHtg = d.rates?.HTG || 130;
    return { text: `💵 1 USD = ${usdHtg.toFixed(2)} HTG\n💶 1 EUR = ${d.rates?.EUR?.toFixed(2)} USD`, source: 'ExchangeRate-API', badge: 'currency' };
  } catch(e) { return null; }
}

async function searchArXiv(query) {
  try {
    const r = await fetch(`http://export.arxiv.org/api/query?search_query=all:${encodeURIComponent(query)}&max_results=2`);
    const text = await r.text();
    const parser = new DOMParser();
    const xml = parser.parseFromString(text, "text/xml");
    const entries = xml.querySelectorAll("entry");
    if(entries.length) {
      const title = entries[0].querySelector("title")?.textContent;
      const summary = entries[0].querySelector("summary")?.textContent.substring(0, 300);
      return { text: `📄 ${title}\n${summary}`, source: 'arXiv (Academic)', badge: 'arxiv' };
    }
  } catch(e) {}
  return null;
}

async function searchPubMed(query) {
  try {
    const r = await fetch(`https://eutils.ncbi.nlm.nih.gov/entrez/eutils/esearch.fcgi?db=pubmed&term=${encodeURIComponent(query)}&retmax=2&format=json`);
    const d = await r.json();
    if(d.esearchresult?.idlist?.length) {
      return { text: `📚 ${d.esearchresult.idlist.length} atik PubMed sou "${query}".`, source: 'PubMed', badge: 'pubmed' };
    }
  } catch(e) {}
  return null;
}

async function searchGoogleBooks(query) {
  try {
    const r = await fetch(`https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(query)}&maxResults=2`);
    const d = await r.json();
    if(d.items?.length) {
      const book = d.items[0].volumeInfo;
      return { text: `📚 ${book.title} — ${book.authors?.join(', ') || 'Otè inconnu'}`, source: 'Google Books', badge: 'books' };
    }
  } catch(e) {}
  return null;
}

async function searchGitHub(query) {
  try {
    const r = await fetch(`https://api.github.com/search/repositories?q=${encodeURIComponent(query)}&per_page=2`);
    const d = await r.json();
    if(d.items?.length) {
      return { text: `💻 ${d.items[0].full_name}: ${d.items[0].description?.substring(0, 200) || ''}`, source: 'GitHub', badge: 'github' };
    }
  } catch(e) {}
  return null;
}

async function searchWiktionary(word) {
  try {
    const r = await fetch(`https://fr.wiktionary.org/api/rest_v1/page/definition/${encodeURIComponent(word)}`);
    if(r.ok) {
      const d = await r.json();
      const def = Object.values(d)[0]?.[0]?.definition;
      if(def) return { text: `📖 Définition: ${def.substring(0, 400)}`, source: 'Wiktionary', badge: 'wiktionary' };
    }
  } catch(e) {}
  return null;
}

async function searchRestCountries(query) {
  try {
    const r = await fetch(`https://restcountries.com/v3.1/name/${encodeURIComponent(query)}`);
    const d = await r.json();
    if(d[0]) {
      return { text: `🌍 ${d[0].name.common}: Kapital ${d[0].capital?.[0]}, Popilasyon ${d[0].population?.toLocaleString()}`, source: 'RestCountries', badge: 'countries' };
    }
  } catch(e) {}
  return null;
}

async function searchTMDB(query) {
  try {
    const r = await fetch(`https://api.themoviedb.org/3/search/movie?api_key=1fd4f4c7a5f5e6b8c9d0e1f2a3b4c5d6&query=${encodeURIComponent(query)}`);
    if(r.ok) {
      const d = await r.json();
      if(d.results?.[0]) {
        return { text: `🎬 ${d.results[0].title} (${d.results[0].release_date?.split('-')[0]}) - ${d.results[0].overview?.substring(0, 200)}`, source: 'TMDB', badge: 'tmdb' };
      }
    }
  } catch(e) {}
  return null;
}

async function askClaude(question, contexts) {
  // Simuler une réponse intelligente (sans clé API pour démo)
  const allTexts = Object.values(contexts).filter(v=>v?.text).map(v=>v.text).join(' ');
  if(allTexts.length > 50) return `🔍 **Résultat de la recherche**\n\n${allTexts.substring(0, 800)}\n\n💡 Basé sur ${Object.values(contexts).filter(v=>v?.source).length} sources.`;
  return `📝 Je n'ai pas trouvé d'information spécifique sur "${question}". Essayez de reformuler ou demandez la météo, actualités, définitions.`;
}

// ==================== MAIN SEARCH ====================
async function fullSearch(question) {
  const ql = question.toLowerCase();
  const tasks = {};
  
  // Wikipedia (FR + EN)
  tasks.wiki_fr = searchWikipedia(ql, 'fr');
  tasks.wiki_en = searchWikipedia(ql, 'en');
  tasks.duck = searchDuckDuckGo(ql);
  
  // Détection automatique
  if(ql.includes('météo') || ql.includes('weather')) tasks.weather = getWeather(ql.replace(/météo|weather/gi,'').trim() || 'Port-au-Prince');
  if(ql.includes('taux') || ql.includes('devise') || ql.includes('dollar')) tasks.currency = getExchangeRate();
  if(ql.includes('arxiv') || ql.includes('recherche') || ql.includes('académique')) tasks.arxiv = searchArXiv(ql);
  if(ql.includes('santé') || ql.includes('medicine')) tasks.pubmed = searchPubMed(ql);
  if(ql.includes('livre') || ql.includes('book')) tasks.books = searchGoogleBooks(ql);
  if(ql.includes('github') || ql.includes('code')) tasks.github = searchGitHub(ql);
  if(ql.includes('definition') || ql.includes('signification')) tasks.wiktionary = searchWiktionary(ql);
  if(ql.includes('pays') || ql.includes('country')) tasks.countries = searchRestCountries(ql);
  if(ql.includes('film') || ql.includes('movie')) tasks.tmdb = searchTMDB(ql);
  
  const results = {};
  const entries = Object.entries(tasks);
  for(let [key, promise] of entries) {
    results[key] = await promise;
  }
  results.ai = await askClaude(question, results);
  return results;
}

// ==================== UI RENDER ====================
function formatText(txt) {
  if(!txt) return '';
  return txt.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');
}

function buildResponseHTML(q, results) {
  let html = '';
  if(results.ai) html += `<div style="margin-bottom:10px">${formatText(results.ai)}</div>`;
  
  const sourcesList = [];
  for(let [key, val] of Object.entries(results)) {
    if(val?.text && key !== 'ai') {
      const sourceName = val.source || key;
      html += `<div style="margin-top:8px;padding:8px;background:rgba(255,255,255,0.03);border-radius:12px;border-left:3px solid #4ade80;">
        <span style="font-size:11px;color:#4ade80;">📡 ${sourceName}</span>
        <div style="font-size:12px;margin-top:4px;">${val.text.substring(0, 300)}</div>
      </div>`;
      sourcesList.push(sourceName);
    }
  }
  
  if(sourcesList.length) {
    html += `<div style="margin-top:10px;display:flex;flex-wrap:wrap;gap:4px;">${sourcesList.map(s => `<span class="badge">${s}</span>`).join('')}</div>`;
  }
  
  if(!results.ai && !sourcesList.length) html = `🔍 Aucun résultat pour "${q}". Essayez: météo, actualités, definition, taux dollar...`;
  return html;
}

function addMessage(role, content) {
  const container = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = `message ${role}`;
  div.innerHTML = `<div class="avatar ${role === 'user' ? 'av-user' : 'av-ai'}">${role === 'user' ? '👤' : '⚡'}</div><div class="msg-bubble">${content}</div>`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function addTyping() {
  const container = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = 'message ai'; div.id = 'typingMsg';
  div.innerHTML = `<div class="avatar av-ai">🔍</div><div class="msg-bubble"><div style="display:flex;gap:4px;align-items:center"><span style="width:6px;height:6px;background:#3b82f6;border-radius:50%;animation:pulse 1s infinite"></span>Recherche sur 20+ sources...</div></div>`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

async function sendQuestion() {
  const input = document.getElementById('userInput');
  const q = input.value.trim();
  if(!q || isProcessing) return;
  isProcessing = true;
  document.getElementById('sendBtn').disabled = true;
  addMessage('user', `<p>${q.replace(/</g,'&lt;')}</p>`);
  input.value = '';
  
  addTyping();
  let results = {};
  try { results = await fullSearch(q); } catch(e) { results = { ai: `Erreur: ${e.message}` }; }
  document.getElementById('typingMsg')?.remove();
  addMessage('ai', buildResponseHTML(q, results));
  
  isProcessing = false;
  document.getElementById('sendBtn').disabled = false;
  input.focus();
}

function handleKey(e) { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendQuestion(); } }
