<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAST AI Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #1e1e2f, #313155); color: white; margin: 0; display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 700px; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); padding: 20px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.1); margin-bottom: 20px; }
        .plans { display: flex; gap: 10px; margin-bottom: 20px; }
        .plan-btn { flex: 1; padding: 15px; border-radius: 10px; border: 1px solid #444; cursor: pointer; text-align: center; background: #333; }
        .plan-btn.active { border-color: #fbbf24; background: #453b1b; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; background: #222; color: white; box-sizing: border-box; }
        button#runBtn { width: 100%; padding: 15px; background: #fbbf24; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="glass">
        <h1>✨ FAST AI</h1>
        <p>Welcome! Configure your API and choose your plan.</p>
        <input type="password" id="apiInput" placeholder="Enter API Key (Hidden)">
    </div>

    <div class="plans">
        <div class="plan-btn" onclick="selectPlan(this, 'free')">FREE<br><small>Limit</small></div>
        <div class="plan-btn" onclick="selectPlan(this, 'basic')">$0.99<br><small>No Limit</small></div>
        <div class="plan-btn" onclick="selectPlan(this, 'premium')">$10.00<br><small>Best</small></div>
    </div>

    <div class="glass">
        <textarea id="userInput" placeholder="How can I help you?"></textarea>
        <button id="runBtn" onclick="processAI()">GENERATE RESPONSE</button>
    </div>

    <div id="output" class="glass" style="display:none;"></div>
</div>

<script>
    let selectedPlan = 'free';

    // Chaje API Key ki te deja anrejistre
    document.getElementById('apiInput').value = localStorage.getItem('fast_ai_key') || '';
    document.getElementById('apiInput').onchange = (e) => localStorage.setItem('fast_ai_key', e.target.value);

    function selectPlan(el, plan) {
        selectedPlan = plan;
        document.querySelectorAll('.plan-btn').forEach(btn => btn.classList.remove('active'));
        el.classList.add('active');
    }

    function processAI() {
        const key = localStorage.getItem('fast_ai_key');
        const input = document.getElementById('userInput').value;
        const out = document.getElementById('output');

        if(!key) { alert("Tanpri antre API Key ou a!"); return; }
        if(!input) { alert("Ekri yon kesyon!"); return; }

        out.style.display = 'block';
        out.innerHTML = "Thinking...";

        // Simulation repons (Nan lavni, ranplase sa ak 'fetch' API ou a)
        setTimeout(() => {
            out.innerHTML = `<strong>Response (${selectedPlan.toUpperCase()}):</strong><br> Simulation repons pou: "${input}". (API Key: ${key.substring(0,4)}****)`;
        }, 1500);
    }
</script>

</body>
</html>
