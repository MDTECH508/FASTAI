<!DOCTYPE html>
<html lang="fr" class="h-full">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass-liquid {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        body { background-color: #030712; color: #e5e7eb; font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="h-screen flex flex-col items-center p-6">

    <div class="w-full max-w-4xl glass-liquid p-4 rounded-2xl flex justify-between items-center mb-6">
        <h1 class="font-bold">FAST AI <span class="text-blue-500 text-xs">V1</span></h1>
        <div class="flex gap-2 text-sm">
            <span class="px-3 py-1 bg-white/5 rounded-full">Database: Loaded</span>
        </div>
    </div>

    <div class="w-full max-w-2xl flex-1 overflow-y-auto mb-6 space-y-4" id="chatBox">
        <div class="glass-liquid p-4 rounded-2xl">Bonjou! Mwen pare pou m reponn kesyon w yo (soti nan liv mwen oswa sou entènèt).</div>
    </div>

    <div class="w-full max-w-3xl glass-liquid p-3 rounded-full flex gap-3">
        <input type="text" id="userInput" placeholder="Poze m yon kesyon..." class="flex-1 bg-transparent outline-none px-4">
        <button onclick="handleSearch()" class="bg-blue-600 px-6 py-2 rounded-full font-bold">Search</button>
    </div>

    <script>
        // 1. Baz done liv ou a
        const myBooksDB = {
            "kisa ki ayiti": "Ayiti se premye repiblik nwa nan mond lan, endepandan depi 1804.",
            "ki sa ki fast ai": "Fast AI se yon asistans entelijan ki fèt pou bay repons rapid."
        };

        async function handleSearch() {
            const input = document.getElementById('userInput').value.toLowerCase();
            const chatBox = document.getElementById('chatBox');
            
            chatBox.innerHTML += `<div class="glass-liquid p-4 rounded-2xl ml-auto w-4/5">${input}</div>`;
            document.getElementById('userInput').value = '';

            // 2. Chèche nan liv (Local DB)
            if (myBooksDB[input]) {
                appendResponse(myBooksDB[input], "Liv mwen");
            } else {
                // 3. Si pa jwenn, chèche sou Wikipedia (entènèt)
                const wikiUrl = `https://fr.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(input)}&format=json&origin=*`;
                
                try {
                    const res = await fetch(wikiUrl);
                    const data = await res.json();
                    const snippet = data.query.search[0]?.snippet.replace(/<[^>]*>?/gm, '');
                    
                    if (snippet) {
                        appendResponse(snippet, "Web (Wikipedia)");
                    } else {
                        appendResponse("Mwen pa jwenn repons nan baz done mwen ni sou entènèt la.", "System");
                    }
                } catch (e) {
                    appendResponse("Erè koneksyon ak entènèt la.", "System");
                }
            }
        }

        function appendResponse(text, source) {
            document.getElementById('chatBox').innerHTML += `
                <div class="glass-liquid p-4 rounded-2xl w-4/5 border-l-4 border-blue-500">
                    <p class="text-[10px] text-gray-500 uppercase">${source}</p>
                    ${text}
                </div>`;
            document.getElementById('chatBox').scrollTop = document.getElementById('chatBox').scrollHeight;
        }
    </script>
</body>
</html>
