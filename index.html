<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>FAST — Recherche Intelligente</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root{
  /* Core — pure noir-gris-bleu like a pro dark UI */
  --ink:    #04050a;
  --ink2:   #080c17;
  --p0:     #0b0f1e;
  --p1:     #0f1424;
  --p2:     #131a2f;
  --p3:     #19233a;
  --p4:     #1f2c47;
  --steel:  #232d44;
  --smoke:  #2c3854;

  /* Borders — gris subtil */
  --e0: rgba(255,255,255,0.03);
  --e1: rgba(120,160,255,0.08);
  --e2: rgba(120,160,255,0.15);
  --e3: rgba(120,160,255,0.28);

  /* Accent */
  --blue:  #2563eb;
  --blue2: #3b82f6;
  --glow:  #93c5fd;
  --cyan:  #0ea5e9;
  --violet:#7c3aed;
  --indigo:#4f46e5;

  /* Text */
  --t0: #f4f7ff;
  --t1: #c8d5ef;
  --t2: #8a9dc0;
  --t3: #4a5d80;
  --t4: #263050;

  /* Status */
  --green:#16a34a;
  --gr2:  #22c55e;
  --gold: #ca8a04;
  --go2:  #fbbf24;
  --rose: #be185d;

  --sidebar: 280px;
  --rad:     12px;
}

html,body{height:100%;overflow:hidden;background:var(--ink);font-family:'Inter',sans-serif;color:var(--t0);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}

/* ══════════════════════════════════
   BACKGROUND SYSTEM
══════════════════════════════════ */
.bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}

/* Subtil gradient radial bleu nwa */
.bg-canvas::before{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(ellipse 60% 50% at 15% 20%, rgba(37,99,235,0.11) 0%, transparent 60%),
    radial-gradient(ellipse 40% 40% at 85% 80%, rgba(79,70,229,0.09) 0%, transparent 55%),
    radial-gradient(ellipse 30% 30% at 50% 50%, rgba(14,165,233,0.05) 0%, transparent 50%);
  animation:bgshift 30s ease-in-out infinite alternate;
}
@keyframes bgshift{
  0%{opacity:1;transform:scale(1)}
  100%{opacity:0.8;transform:scale(1.05) translate(8px,-5px)}
}

/* Grille fine gris */
.bg-canvas::after{
  content:'';position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(120,160,255,0.018) 1px,transparent 1px),
    linear-gradient(90deg,rgba(120,160,255,0.018) 1px,transparent 1px);
  background-size:52px 52px;
}

/* Particules flottantes */
.particle{
  position:absolute;border-radius:50%;
  background:rgba(59,130,246,0.12);
  animation:partfloat linear infinite;
  pointer-events:none;
}
@keyframes partfloat{
  0%{transform:translateY(0) translateX(0);opacity:0}
  10%{opacity:1}
  90%{opacity:0.8}
  100%{transform:translateY(-120vh) translateX(30px);opacity:0}
}

/* ══════════════════════════════════
   LAYOUT
══════════════════════════════════ */
.shell{display:flex;height:100vh;position:relative;z-index:1}

/* ══════════════════════════════════
   FLOATING SIDEBAR (glassmorphism)
══════════════════════════════════ */
.sidebar{
  position:fixed;
  top:14px;left:14px;bottom:14px;
  width:var(--sidebar);
  z-index:300;

  /* Glassmorphism gri-nwa */
  background:
    linear-gradient(160deg,
      rgba(15,20,36,0.94) 0%,
      rgba(9,12,22,0.97) 60%,
      rgba(6,8,16,0.98) 100%);
  backdrop-filter:blur(48px) saturate(200%) brightness(0.9);
  -webkit-backdrop-filter:blur(48px) saturate(200%) brightness(0.9);

  border:1px solid rgba(120,160,255,0.11);
  border-radius:20px;

  box-shadow:
    0 0 0 1px rgba(0,0,0,0.6),
    0 8px 24px rgba(0,0,0,0.5),
    0 24px 64px rgba(0,0,0,0.4),
    0 0 80px rgba(37,99,235,0.04),
    inset 0 1px 0 rgba(255,255,255,0.06),
    inset 1px 0 0 rgba(255,255,255,0.03);

  display:flex;flex-direction:column;
  overflow:hidden;
  transition:transform .32s cubic-bezier(.22,.88,.24,1);
}

/* Ligne lumineuse en haut */
.sidebar::before{
  content:'';position:absolute;top:0;left:16%;right:16%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(147,197,253,0.35),rgba(167,139,250,0.25),transparent);
  border-radius:1px;z-index:2;pointer-events:none;
}

/* Reflet subtil en bas à gauche */
.sidebar::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:60px;
  background:linear-gradient(to top,rgba(37,99,235,0.04),transparent);
  pointer-events:none;border-radius:0 0 20px 20px;
}

/* ── Brand header ── */
.brand{
  padding:18px 16px 14px;
  border-bottom:1px solid var(--e1);
  background:linear-gradient(180deg,rgba(37,99,235,0.08) 0%,transparent);
  flex-shrink:0;position:relative;z-index:1;
}
.brand-row{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.brand-icon{
  width:42px;height:42px;border-radius:11px;font-size:20px;flex-shrink:0;
  background:linear-gradient(145deg,#1e3a8a,#0c4a6e);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 0 1px rgba(30,58,138,0.5),0 0 22px rgba(37,99,235,0.32),0 4px 16px rgba(0,0,0,0.5);
  position:relative;
}
.brand-icon::after{
  content:'';position:absolute;inset:-1px;border-radius:12px;
  background:linear-gradient(135deg,rgba(147,197,253,0.3),transparent 50%);
  pointer-events:none;
}
.brand-name{
  font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:17px;letter-spacing:-.4px;
  background:linear-gradient(135deg,#ffffff 0%,#93c5fd 50%,#c4b5fd 100%);
  -webkit-background-clip:text;background-clip:text;color:transparent;
}
.brand-tagline{font-size:9px;color:var(--t3);margin-top:2px;font-family:'JetBrains Mono',monospace;letter-spacing:.5px}
.brand-badge{
  display:inline-flex;align-items:center;gap:5px;
  background:rgba(202,138,4,0.09);border:1px solid rgba(202,138,4,0.22);
  border-radius:30px;padding:3px 10px;font-size:8.5px;font-weight:600;color:var(--go2);letter-spacing:.8px;
}

/* ── Sidebar scroll body ── */
.sb-body{flex:1;overflow-y:auto;padding:8px 11px 4px;scrollbar-width:thin;scrollbar-color:rgba(120,160,255,0.12) transparent}
.sb-body::-webkit-scrollbar{width:3px}
.sb-body::-webkit-scrollbar-thumb{background:rgba(120,160,255,0.15);border-radius:3px}

.sb-label{
  font-size:7.5px;text-transform:uppercase;letter-spacing:2.5px;color:var(--t4);
  display:block;padding:10px 4px 5px;font-family:'JetBrains Mono',monospace;
}

/* History items */
.hi{
  display:flex;align-items:center;gap:8px;
  padding:8px 10px;border-radius:10px;cursor:pointer;
  font-size:11.5px;color:var(--t2);border:1px solid transparent;
  transition:all .18s;margin-bottom:2px;position:relative;overflow:hidden;
}
.hi::before{content:'';position:absolute;inset:0;border-radius:10px;
  background:linear-gradient(135deg,rgba(37,99,235,0.06),rgba(79,70,229,0.04));
  opacity:0;transition:opacity .2s}
.hi:hover{border-color:rgba(120,160,255,0.14);color:var(--t0)}
.hi:hover::before{opacity:1}
.hi.on{background:rgba(37,99,235,0.1);border-color:rgba(59,130,246,0.25);color:var(--t0)}
.hi-ico{font-size:12px;flex-shrink:0;opacity:.6}
.hi-txt{flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.hi-time{font-size:8px;color:var(--t4);flex-shrink:0;font-family:'JetBrains Mono',monospace}

/* Sources */
.src-grid{display:grid;grid-template-columns:1fr 1fr;gap:3px;margin-bottom:8px}
.src-it{
  background:rgba(15,20,36,0.7);border:1px solid rgba(255,255,255,0.04);
  border-radius:8px;padding:5px 7px;font-size:9px;color:var(--t2);
  display:flex;align-items:center;gap:5px;transition:all .18s;
}
.src-it:hover{background:rgba(25,35,58,0.8);border-color:rgba(120,160,255,0.12)}
.src-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.src-live{
  font-size:6px;font-family:'JetBrains Mono',monospace;
  background:rgba(22,163,74,0.09);border:1px solid rgba(22,163,74,0.25);
  color:var(--gr2);border-radius:20px;padding:1px 4px;margin-left:auto;flex-shrink:0;
}

/* WhatsApp */
.wa{
  background:linear-gradient(145deg,rgba(20,83,45,0.10),rgba(15,60,35,0.06));
  border:1px solid rgba(34,197,94,0.14);border-radius:13px;padding:12px;margin:4px 0 8px;
}
.wa-t{font-size:11.5px;font-weight:600;color:#4ade80;display:flex;align-items:center;gap:7px;margin-bottom:6px}
.wa-s{font-size:9.5px;color:var(--gr2);margin-bottom:8px}
.wa-r{display:flex;gap:5px}
.wa-r input{
  flex:1;background:rgba(0,0,0,0.3);border:1px solid rgba(34,197,94,0.18);
  border-radius:30px;padding:6px 12px;font-size:10px;color:var(--t0);outline:none;font-family:inherit;
  transition:border-color .2s;
}
.wa-r input:focus{border-color:rgba(34,197,94,0.42)}
.wa-r button{
  background:linear-gradient(135deg,#16a34a,#14532d);border:none;
  border-radius:30px;padding:6px 13px;font-size:10px;font-weight:700;cursor:pointer;color:white;
  transition:opacity .2s;
}
.wa-r button:hover{opacity:.85}

.new-btn{
  margin:2px 0 12px;
  background:linear-gradient(135deg,rgba(37,99,235,0.08),rgba(79,70,229,0.06));
  border:1px solid rgba(120,160,255,0.16);border-radius:40px;
  padding:10px;text-align:center;cursor:pointer;
  font-size:11.5px;font-weight:500;color:var(--glow);
  transition:all .2s;flex-shrink:0;
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.04);
}
.new-btn:hover{background:linear-gradient(135deg,rgba(37,99,235,0.16),rgba(79,70,229,0.12));border-color:rgba(120,160,255,0.3);color:#fff}

/* ══════════════════════════════════
   MAIN AREA
══════════════════════════════════ */
.main{
  flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;
  margin-left:calc(var(--sidebar) + 28px);
  transition:margin-left .32s cubic-bezier(.22,.88,.24,1);
}

/* ── SEARCH TOPBAR (style Google dark) ── */
.topbar{
  margin:14px 14px 0;
  padding:10px 18px;
  background:linear-gradient(135deg,rgba(13,18,32,0.90) 0%,rgba(8,11,20,0.94) 100%);
  backdrop-filter:blur(40px) saturate(180%);
  -webkit-backdrop-filter:blur(40px) saturate(180%);
  border:1px solid rgba(120,160,255,0.10);
  border-radius:var(--rad);
  box-shadow:
    0 0 0 1px rgba(0,0,0,0.45),
    0 4px 18px rgba(0,0,0,0.38),
    inset 0 1px 0 rgba(255,255,255,0.05);
  display:flex;align-items:center;gap:12px;flex-shrink:0;
}
.tb-logo{
  width:32px;height:32px;border-radius:9px;font-size:14px;flex-shrink:0;
  background:linear-gradient(145deg,rgba(30,58,138,0.8),rgba(12,74,110,0.8));
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 12px rgba(37,99,235,0.25);
}
.tb-title{font-size:14px;font-weight:700;letter-spacing:-.3px}
.tb-sub{font-size:9px;color:var(--t2);margin-top:1px}
.tb-status{
  margin-left:auto;display:flex;align-items:center;gap:6px;
  background:rgba(22,163,74,0.08);border:1px solid rgba(22,163,74,0.18);
  border-radius:20px;padding:4px 10px;flex-shrink:0;
}
.tb-dot{width:5px;height:5px;border-radius:50%;background:var(--gr2);animation:blink 2.5s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
.tb-txt{font-size:9px;color:var(--gr2);font-family:'JetBrains Mono',monospace;white-space:nowrap}
.hbtn{
  display:none;background:rgba(37,99,235,0.09);border:1px solid rgba(120,160,255,0.18);
  border-radius:8px;padding:6px 11px;cursor:pointer;color:var(--t2);font-size:14px;transition:all .2s;
}
.hbtn:hover{background:rgba(37,99,235,0.2);color:white}

/* ── Quick pills (catégories) ── */
.pills{
  margin:8px 14px 0;
  padding:6px 14px;
  background:linear-gradient(135deg,rgba(10,13,26,0.82) 0%,rgba(8,10,22,0.88) 100%);
  backdrop-filter:blur(30px);
  border:1px solid rgba(120,160,255,0.08);
  border-radius:var(--rad);
  box-shadow:0 4px 14px rgba(0,0,0,0.28),inset 0 1px 0 rgba(255,255,255,0.04);
  display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;flex-shrink:0;
}
.pills::-webkit-scrollbar{display:none}
.pill{
  display:inline-flex;align-items:center;gap:5px;padding:5px 13px;border-radius:30px;
  font-size:10px;font-weight:500;white-space:nowrap;cursor:pointer;transition:all .18s;
  background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);color:var(--t2);
  user-select:none;flex-shrink:0;
}
.pill:hover{background:rgba(120,160,255,0.1);border-color:rgba(120,160,255,0.2);color:var(--t0)}
.pill.on{background:rgba(37,99,235,0.14);border-color:rgba(59,130,246,0.32);color:var(--glow)}

/* ── MESSAGES ── */
.msgs-zone{flex:1;overflow:hidden;display:flex;flex-direction:column;padding:8px 14px 0}
.msgs{
  flex:1;overflow-y:auto;padding:10px 0 4px;
  display:flex;flex-direction:column;gap:12px;
  scroll-behavior:smooth;scrollbar-width:thin;scrollbar-color:rgba(120,160,255,0.09) transparent;
}
.msgs::-webkit-scrollbar{width:4px}
.msgs::-webkit-scrollbar-thumb{background:rgba(120,160,255,0.13);border-radius:4px}

.msg{display:flex;gap:9px;animation:msgIn .26s cubic-bezier(.22,.88,.24,1)}
.msg.u{flex-direction:row-reverse}
@keyframes msgIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

.ava{
  width:30px;height:30px;border-radius:50%;flex-shrink:0;margin-top:2px;
  display:flex;align-items:center;justify-content:center;font-size:13px;
}
.ava-u{background:linear-gradient(135deg,rgba(37,99,235,0.28),rgba(79,70,229,0.28))}
.ava-a{background:linear-gradient(135deg,rgba(14,165,233,0.2),rgba(37,99,235,0.2))}

.bubble{
  max-width:78%;padding:12px 16px;font-size:13.5px;line-height:1.74;
  background:linear-gradient(145deg,rgba(13,18,34,0.94),rgba(9,12,24,0.97));
  border:1px solid rgba(120,160,255,0.10);
  border-radius:18px 18px 18px 5px;
  box-shadow:0 4px 14px rgba(0,0,0,0.3),inset 0 1px 0 rgba(255,255,255,0.04);
}
.msg.u .bubble{
  background:linear-gradient(145deg,rgba(30,58,138,0.2),rgba(37,99,235,0.13));
  border-color:rgba(59,130,246,0.24);
  border-radius:18px 18px 5px 18px;
}

/* Source cards */
.sc{
  margin-top:8px;padding:9px 12px;
  background:rgba(0,0,0,0.22);border-radius:10px;border-left:2px solid;
}
.sc-n{font-size:10px;font-weight:600;margin-bottom:4px;display:flex;align-items:center;gap:5px}
.sc-t{font-size:12.5px;color:var(--t1);line-height:1.55}
.sc-url{font-size:9px;color:var(--t3);margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sc-url a{color:var(--glow);text-decoration:none}
.sc-url a:hover{text-decoration:underline}

.badges{display:flex;flex-wrap:wrap;gap:4px;margin-top:10px}
.badge{
  display:inline-flex;align-items:center;gap:3px;font-size:8.5px;font-weight:500;
  font-family:'JetBrains Mono',monospace;padding:2px 7px;border-radius:20px;
  background:rgba(22,163,74,0.07);border:1px solid rgba(22,163,74,0.2);color:var(--gr2);
}

/* Image générée */
.gi-wrap{margin-top:10px;max-width:320px}
.gi{width:100%;border-radius:12px;display:block;border:1px solid rgba(120,160,255,0.15);animation:fadeUp .5s ease}
@keyframes fadeUp{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:none}}
.gi-cap{font-size:9px;color:var(--t3);margin-top:5px;font-family:'JetBrains Mono',monospace}
.skel{width:300px;height:190px;border-radius:12px;
  background:linear-gradient(90deg,var(--p1) 25%,var(--p2) 50%,var(--p1) 75%);
  background-size:200% 100%;animation:shim 1.5s infinite}
@keyframes shim{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* Voice button */
.vbtn{
  display:inline-flex;align-items:center;gap:7px;margin-top:10px;
  background:rgba(124,58,237,0.09);border:1px solid rgba(124,58,237,0.22);
  border-radius:30px;padding:6px 14px;font-size:11px;font-weight:600;color:#c4b5fd;
  cursor:pointer;transition:all .2s;user-select:none;
}
.vbtn:hover{background:rgba(124,58,237,0.18);border-color:rgba(167,139,250,0.4)}
.vbtn.playing{background:rgba(124,58,237,0.24);border-color:rgba(196,181,253,0.5);color:white}
.waves{display:flex;gap:2px;align-items:center;height:13px}
.waves span{width:2.5px;border-radius:3px;background:currentColor;animation:wv 1s ease-in-out infinite}
.waves span:nth-child(1){height:4px;animation-delay:0s}
.waves span:nth-child(2){height:10px;animation-delay:.1s}
.waves span:nth-child(3){height:6px;animation-delay:.2s}
.waves span:nth-child(4){height:13px;animation-delay:.3s}
.waves span:nth-child(5){height:5px;animation-delay:.4s}
@keyframes wv{0%,100%{transform:scaleY(1)}50%{transform:scaleY(1.9)}}

/* Typing */
.tdots{display:flex;gap:4px;align-items:center;padding:3px 0}
.tdots span{width:6px;height:6px;border-radius:50%;background:var(--blue2);opacity:.6;animation:db 1.2s ease-in-out infinite}
.tdots span:nth-child(2){animation-delay:.15s}
.tdots span:nth-child(3){animation-delay:.3s}
@keyframes db{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px)}}

/* Progress */
.pgbar{height:2px;background:rgba(120,160,255,0.07);border-radius:2px;margin:6px 0;overflow:hidden;display:none}
.pgbar.v{display:block}
.pgfill{height:100%;border-radius:2px;width:0%;transition:width .4s ease;
  background:linear-gradient(90deg,var(--blue),var(--cyan),var(--violet));
  background-size:200% 100%;animation:gsh 2s linear infinite}
@keyframes gsh{0%{background-position:0% 50%}100%{background-position:200% 50%}}

/* ── SEARCH INPUT AREA (style Google) ── */
.inp-zone{margin:8px 14px 14px}
.mode-bar{display:none;align-items:center;gap:7px;font-size:11px;color:var(--t2);padding:0 4px 7px}
.mode-bar.v{display:flex}
.mode-dot{width:7px;height:7px;border-radius:50%}

/* Le vrai champ de recherche FAST — inspiré Google Search */
.search-bar{
  position:relative;
  background:linear-gradient(145deg,rgba(12,16,30,0.92),rgba(8,10,22,0.96));
  backdrop-filter:blur(40px) saturate(170%);
  border:1px solid rgba(120,160,255,0.16);
  border-radius:52px;
  padding:8px 8px 8px 20px;
  display:flex;align-items:flex-end;gap:8px;
  box-shadow:
    0 0 0 1px rgba(0,0,0,0.3),
    0 4px 20px rgba(0,0,0,0.38),
    inset 0 1px 0 rgba(255,255,255,0.06);
  transition:border-color .22s,box-shadow .22s;
}
.search-bar:focus-within{
  border-color:rgba(59,130,246,0.40);
  box-shadow:
    0 0 0 1px rgba(0,0,0,0.3),
    0 4px 20px rgba(0,0,0,0.38),
    inset 0 1px 0 rgba(255,255,255,0.06),
    0 0 0 4px rgba(37,99,235,0.09);
}
#uinput{
  flex:1;background:transparent;border:none;outline:none;
  color:var(--t0);font-size:14px;padding:10px 0;
  resize:none;font-family:inherit;line-height:1.5;max-height:140px;overflow-y:auto;
}
#uinput::placeholder{color:var(--t4)}
.btn-group{display:flex;gap:6px;align-items:center;flex-shrink:0}

.ab{
  border:none;border-radius:50%;cursor:pointer;font-size:15px;
  width:40px;height:40px;display:flex;align-items:center;justify-content:center;
  transition:all .18s;flex-shrink:0;
}
.micb{background:rgba(124,58,237,0.12);color:#c4b5fd;border:1px solid rgba(124,58,237,0.22)}
.micb:hover{background:rgba(124,58,237,0.24);color:white}
.micb.on{background:rgba(239,68,68,0.18);color:#fca5a5;border-color:rgba(239,68,68,0.38);animation:mpulse 1s ease-in-out infinite}
@keyframes mpulse{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,0.25)}50%{box-shadow:0 0 0 9px rgba(239,68,68,0)}}
.imgb{background:rgba(219,39,119,0.1);color:#f9a8d4;border:1px solid rgba(219,39,119,0.22)}
.imgb:hover{background:rgba(219,39,119,0.22);color:white}
.imgb.on{background:rgba(219,39,119,0.24);color:white;border-color:rgba(219,39,119,0.46)}
.sendb{
  background:linear-gradient(145deg,#1d4ed8,#0369a1);
  border:none;width:44px;height:44px;border-radius:50%;cursor:pointer;color:white;font-size:18px;
  flex-shrink:0;box-shadow:0 0 22px rgba(37,99,235,0.38);transition:all .18s;
}
.sendb:hover{transform:scale(1.07);box-shadow:0 0 30px rgba(59,130,246,0.55)}
.sendb:active{transform:scale(.92)}
.sendb:disabled{opacity:.35;cursor:not-allowed;transform:none;box-shadow:none}

/* ── OVERLAY ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.58);backdrop-filter:blur(6px);z-index:200}
.overlay.v{display:block}

/* ── MOBILE ── */
@media(max-width:820px){
  .sidebar{transform:translateX(calc(-100% - 24px));top:0;left:0;bottom:0;border-radius:0 18px 18px 0}
  .sidebar.open{transform:translateX(0)}
  .main{margin-left:0}
  .hbtn{display:flex;align-items:center;gap:6px}
  .tb-status{display:none}
  .bubble{max-width:92%}
  .topbar,.pills,.msgs-zone,.inp-zone{margin-left:6px;margin-right:6px}
}

/* ── UTILITY ── */
.divider{height:1px;background:rgba(120,160,255,0.08);margin:10px 0}
</style>
</head>
<body>

<!-- BG -->
<div class="bg-canvas"></div>
<div id="particles"></div>

<!-- Overlay mobile -->
<div class="overlay" id="ov"></div>

<div class="shell">

<!-- ════════ FLOATING SIDEBAR ════════ -->
<aside class="sidebar" id="sb">
  <div class="brand">
    <div class="brand-row">
      <div class="brand-icon">⚡</div>
      <div>
        <div class="brand-name">FAST v7</div>
        <div class="brand-tagline">50+ SOURCES · IMAGE AI · VOICE</div>
      </div>
    </div>
    <div class="brand-badge">🇭🇹 TECH AYISYEN</div>

  <div class="sb-body">

    <span class="sb-label">📡 50+ Sources Aktif</span>
    <div class="src-grid" id="srcg"></div>

    <div class="pill" onclick="qa('ki dènye dekouvèt syantifik NASA 2024 2025')">🔬 Syans</div>
    <div class="pill" onclick="qa('ban mwen yon blag dròl an kreyòl')">😄 Blag</div>

      <div class="btn-group">
        <button class="ab micb" id="micbtn" onclick="toggleMic()" title="Pale">🎙️</button>
        <button class="ab imgb" id="imgbtn" onclick="toggleImg()" title="Imaj AI">🎨</button>
        <button class="sendb" id="sbtn" onclick="sendQ()">➤</button>
      </div>

</main>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════════
// FAST v7 — 50+ Sources · Claude AI · Image · Voice
// ═══════════════════════════════════════════════════════════════════════

let busy=false,imgMode=false,micing=false,recog=null;
const synth=window.speechSynthesis;
let hist=[],activeId=null,mc=0,mode='chat';

// ── Particules flottantes ──
(function spawnParticles(){
  const c=document.getElementById('particles');
  for(let i=0;i<18;i++){
    const el=document.createElement('div');
    el.className='particle';
    const sz=Math.random()*4+2;
    const left=Math.random()*100;
    const delay=Math.random()*30;
    const dur=Math.random()*20+15;
    el.style.cssText=`width:${sz}px;height:${sz}px;left:${left}%;bottom:-10px;animation-delay:${delay}s;animation-duration:${dur}s;opacity:${Math.random()*0.4+0.1}`;
    c.appendChild(el);
  }
})();

// ── 50+ SOURCES ──
const SRCS=[
  {n:"Wikipedia FR",c:"#4ade80"},{n:"Wikipedia EN",c:"#4ade80"},{n:"DuckDuckGo",c:"#facc15"},
  {n:"Open-Meteo",c:"#38bdf8"},{n:"ExchangeRate-API",c:"#38bdf8"},{n:"CoinGecko",c:"#10b981"},
  {n:"CryptoCompare",c:"#10b981"},{n:"arXiv Science",c:"#a78bfa"},{n:"PubMed Médecine",c:"#f43f5e"},
  {n:"Google Books",c:"#fbbf24"},{n:"Open Library",c:"#f59e0b"},{n:"GitHub",c:"#94a3b8"},
  {n:"TMDB Films",c:"#ec4899"},{n:"TMDB Séries",c:"#f472b6"},{n:"Wiktionary FR",c:"#10b981"},
  {n:"Free Dictionary",c:"#34d399"},{n:"RestCountries",c:"#3b82f6"},{n:"NASA APOD",c:"#06b6d4"},
  {n:"NASA Mars",c:"#0ea5e9"},{n:"JokeAPI",c:"#fbbf24"},{n:"Quotable",c:"#38bdf8"},
  {n:"PoetryDB",c:"#ec4899"},{n:"Open Trivia DB",c:"#a78bfa"},{n:"MusicBrainz",c:"#8b5cf6"},
  {n:"iTunes",c:"#f87171"},{n:"PokeAPI",c:"#fbbf24"},{n:"Jikan Anime",c:"#f472b6"},
  {n:"OpenFoodFacts",c:"#84cc16"},{n:"TheMealDB",c:"#fb923c"},{n:"HackerNews",c:"#f97316"},
  {n:"DEV.to",c:"#6366f1"},{n:"Numbers API",c:"#a78bfa"},{n:"Chuck Norris",c:"#f43f5e"},
  {n:"Rick & Morty",c:"#22c55e"},{n:"Studio Ghibli",c:"#34d399"},{n:"TheCocktailDB",c:"#f97316"},
  {n:"OpenStreetMap",c:"#22c55e"},{n:"StackExchange",c:"#f59e0b"},{n:"Urban Dict",c:"#fb923c"},
  {n:"Agify",c:"#94a3b8"},{n:"IP-API",c:"#38bdf8"},{n:"Binance",c:"#f59e0b"},
  {n:"Coinpaprika",c:"#10b981"},{n:"Merriam-Webster",c:"#60a5fa"},{n:"Nationalize",c:"#3b82f6"},
  {n:"Project Gutenberg",c:"#fbbf24"},{n:"Semantic Scholar",c:"#818cf8"},
  {n:"Pollinations.AI",c:"#ec4899"},{n:"Claude AI",c:"#a78bfa"},{n:"TTS Browser",c:"#7c3aed"},
];
document.getElementById('srcg').innerHTML=SRCS.map(s=>
  `<div class="src-it"><div class="src-dot" style="background:${s.c};box-shadow:0 0 5px ${s.c}66"></div><span>${s.n}</span><span class="src-live">LIVE</span></div>`
).join('');

// ── History ──
function saveH(q,html){
  const id=Date.now(),now=new Date();
  const t=now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
  hist.unshift({id,q:q.slice(0,44)+(q.length>44?'…':''),t,fq:q,html});
  activeId=id;renderH();
}
function renderH(){
  const el=document.getElementById('hlist');
  if(!hist.length){el.innerHTML='<div style="font-size:11px;color:var(--t4);padding:6px 4px">Anko pa gen istwa.</div>';return;}
  el.innerHTML=hist.slice(0,14).map(c=>
    `<div class="hi ${c.id===activeId?'on':''}" onclick="loadH(${c.id})">
      <span class="hi-ico">🔍</span><span class="hi-txt">${c.q}</span><span class="hi-time">${c.t}</span>
    </div>`).join('');
}
renderH();
function loadH(id){
  const c=hist.find(x=>x.id===id);if(!c)return;
  activeId=id;renderH();
  document.getElementById('msgs').innerHTML='';
  addMsg('u',`<p>${c.fq.replace(/</g,'&lt;')}</p>`);
  addMsg('a',c.html);closeSB();
}

// ── Mode ──
function setMode(m){
  mode=m;
  document.querySelectorAll('.pill[data-m]').forEach(p=>p.classList.toggle('on',p.dataset.m===m));
  const bar=document.getElementById('mbar'),dot=document.getElementById('mdot'),txt=document.getElementById('mtxt');
  if(m==='img'){imgMode=true;bar.classList.add('v');dot.style.background='#db2777';
    txt.textContent='🎨 Mode Imaj — dekri sa ou vle wè';document.getElementById('imgbtn').classList.add('on');
  }else{imgMode=false;bar.classList.remove('v');document.getElementById('imgbtn').classList.remove('on');}
}
function toggleImg(){setMode(imgMode?'chat':'img');}
function qa(q){document.getElementById('uinput').value=q;sendQ();}
function setStat(t){document.getElementById('stxt').textContent=t;}

// ── Image Generation (Pollinations.ai — free) ──
async function genImg(prompt){
  const p=encodeURIComponent('cinematic, high quality, detailed, 8k: '+prompt.replace(/jenere|crée|dessine|generate|draw|montre moi/gi,'').trim());
  return `https://image.pollinations.ai/prompt/${p}?width=512&height=512&seed=${Math.floor(Math.random()*999999)}&nologo=true&enhance=true`;
}

// ── TTS ──
function speak(text,btn){
  if(!synth)return;synth.cancel();
  if(btn?.classList.contains('playing')){btn.classList.remove('playing');return;}
  const clean=text.replace(/<[^>]+>/g,'').replace(/[*#_`~]/g,'').replace(/\n+/g,' ').slice(0,700);
  const utt=new SpeechSynthesisUtterance(clean);
  const go=()=>{
    const vs=synth.getVoices();
    const v=vs.find(x=>x.lang.startsWith('fr'))||vs.find(x=>x.lang.startsWith('en'))||vs[0];
    if(v)utt.voice=v;utt.rate=0.9;utt.pitch=1.05;
    if(btn){btn.classList.add('playing');utt.onend=utt.onerror=()=>btn.classList.remove('playing');}
    synth.speak(utt);
  };
  synth.getVoices().length?go():(synth.onvoiceschanged=()=>{go();synth.onvoiceschanged=null;});
}

// ── STT ──
function toggleMic(){
  const btn=document.getElementById('micbtn');
  if(!('webkitSpeechRecognition' in window||'SpeechRecognition' in window)){
    addMsg('a','<span style="color:var(--rose)">⚠️ Navigatè ou pa sipòte vwa. Eseye Chrome.</span>');return;
  }
  if(micing){recog?.stop();micing=false;btn.classList.remove('on');btn.textContent='🎙️';setStat('Aktif');return;}
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  recog=new SR();recog.lang='fr-FR';recog.interimResults=false;
  recog.onresult=e=>{const t=e.results[0][0].transcript;document.getElementById('uinput').value=t;autoR(document.getElementById('uinput'));sendQ();};
  recog.onerror=recog.onend=()=>{micing=false;btn.classList.remove('on');btn.textContent='🎙️';setStat('Aktif');};
  recog.start();micing=true;btn.classList.add('on');btn.textContent='🔴';setStat('🎙️ Ap koute…');
}

// ═══════ APIS ═══════
const fj=async url=>{try{const r=await fetch(url);if(r.ok)return r.json();}catch(e){}return null;};
const ft=async url=>{try{const r=await fetch(url);if(r.ok)return r.text();}catch(e){}return null;};

async function doWiki(q,l='fr'){
  const d=await fj(`https://${l}.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(q)}`);
  return d?.extract?{text:d.extract.slice(0,700),src:`Wikipedia ${l.toUpperCase()}`,c:'#4ade80',url:d.content_urls?.desktop?.page}:null;
}
async function doDuck(q){
  const d=await fj(`https://api.duckduckgo.com/?q=${encodeURIComponent(q)}&format=json&no_html=1&skip_disambig=1`);
  if(d?.AbstractText?.length>20)return{text:d.AbstractText.slice(0,600),src:'DuckDuckGo',c:'#facc15',url:d.AbstractURL};
  const rel=d?.RelatedTopics?.filter(x=>x.Text)?.slice(0,3)?.map(x=>x.Text)?.join(' | ');
  return rel?.length>10?{text:rel.slice(0,400),src:'DuckDuckGo',c:'#facc15'}:null;
}
async function doWeather(city){
  const g=await fj(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&format=json`);
  if(!g?.results?.[0])return null;
  const{latitude:la,longitude:lo,name:nm,country:co,timezone:tz}=g.results[0];
  const w=await fj(`https://api.open-meteo.com/v1/forecast?latitude=${la}&longitude=${lo}&current_weather=true&hourly=relative_humidity_2m,precipitation_probability,apparent_temperature&daily=temperature_2m_max,temperature_2m_min&timezone=${encodeURIComponent(tz||'auto')}&forecast_days=3`);
  if(!w)return null;
  const cw=w.current_weather;
  const C={0:'☀️ Klè',1:'🌤️ Prèske klè',2:'⛅ Pasyèl',3:'☁️ Kouvri',45:'🌫️ Bwouya',51:'🌦️ Lapli fèb',61:'🌧️ Lapli',80:'⛈️ Lapli rapid',95:'⛈️ Lotaj'};
  return{text:`📍 **${nm}, ${co}**\n🌡️ **${cw.temperature}°C** (resanti ${w.hourly?.apparent_temperature?.[0]?.toFixed(1)||'?'}°C)\n${C[cw.weathercode]||'🌡️'}\n💨 Van: ${cw.windspeed} km/h | 💧 ${w.hourly?.relative_humidity_2m?.[0]||'?'}% imidite\n🌧️ Chans lapli: ${w.hourly?.precipitation_probability?.[0]||0}% | Max ${w.daily?.temperature_2m_max?.[0]?.toFixed(1)||'?'}°C`,src:'Open-Meteo',c:'#38bdf8'};
}
async function doCurrency(){
  const d=await fj('https://open.er-api.com/v6/latest/USD');
  if(!d?.rates)return null;
  return{text:`💵 **1 USD = ${d.rates.HTG?.toFixed(2)} HTG**\n💶 1 USD = ${(1/d.rates.EUR)?.toFixed(4)} EUR\n🇨🇦 1 USD = ${d.rates.CAD?.toFixed(4)} CAD`,src:'ExchangeRate-API',c:'#38bdf8'};
}
async function doCrypto(ids='bitcoin,ethereum,solana'){
  const d=await fj(`https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=usd,eur&include_24hr_change=true`);
  if(!d)return null;
  const lines=Object.entries(d).map(([k,v])=>{const ch=v.usd_24h_change?.toFixed(2)||'?';return`${parseFloat(ch)>=0?'📈':'📉'} **${k}**: $${v.usd?.toLocaleString()} (${ch}% 24h)`;});
  return{text:`₿ **Krypto (Tan Reyèl):**\n${lines.join('\n')}`,src:'CoinGecko',c:'#10b981'};
}
async function doArxiv(q){
  const xml=new DOMParser().parseFromString(await ft(`https://export.arxiv.org/api/query?search_query=all:${encodeURIComponent(q)}&max_results=1`)||'','text/xml');
  const e=xml.querySelector('entry');if(!e)return null;
  const auths=[...xml.querySelectorAll('author name')].slice(0,3).map(a=>a.textContent).join(', ');
  return{text:`📄 **${e.querySelector('title')?.textContent?.trim()}**\n👤 ${auths}\n${e.querySelector('summary')?.textContent?.trim().slice(0,350)}`,src:'arXiv',c:'#a78bfa'};
}
async function doPubmed(q){
  const s=await fj(`https://eutils.ncbi.nlm.nih.gov/entrez/eutils/esearch.fcgi?db=pubmed&term=${encodeURIComponent(q)}&retmax=3&format=json`);
  const cnt=s?.esearchresult?.count;if(!cnt||cnt==='0')return null;
  return{text:`💊 **${cnt} atik medikal** sou "${q}"\nIDs: ${s.esearchresult.idlist?.join(', ')}`,src:'PubMed',c:'#f43f5e',url:`https://pubmed.ncbi.nlm.nih.gov/?term=${encodeURIComponent(q)}`};
}
async function doBooks(q){
  const d=await fj(`https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(q)}&maxResults=1`);
  if(!d?.items?.[0])return null;const b=d.items[0].volumeInfo;
  return{text:`📚 **"${b.title}"** — ${b.authors?.join(', ')||'Enkoni'} (${b.publishedDate?.slice(0,4)||'?'})\n${b.description?.slice(0,200)||''}`,src:'Google Books',c:'#fbbf24',url:b.infoLink};
}
async function doGithub(q){
  const d=await fj(`https://api.github.com/search/repositories?q=${encodeURIComponent(q)}&per_page=1&sort=stars`);
  if(!d?.items?.[0])return null;const r=d.items[0];
  return{text:`💻 **${r.full_name}** ⭐${r.stargazers_count?.toLocaleString()}\n${r.language||'?'} | ${r.forks_count?.toLocaleString()} forks\n${r.description?.slice(0,200)||''}`,src:'GitHub',c:'#94a3b8',url:r.html_url};
}
async function doTmdb(q,type='movie'){
  const d=await fj(`https://api.themoviedb.org/3/search/${type}?api_key=15d2ea6d0dc1d476efbca3eba2b9bbfb&query=${encodeURIComponent(q)}&language=fr-FR`);
  if(!d?.results?.[0])return null;const m=d.results[0];
  return{text:`🎬 **${m.title||m.name}** (${(m.release_date||m.first_air_date||'?').slice(0,4)})\n⭐ ${m.vote_average?.toFixed(1)}/10 — ${m.overview?.slice(0,220)||''}`,src:'TMDB',c:'#ec4899'};
}
async function doWikt(w){
  const r=await fetch(`https://fr.wiktionary.org/api/rest_v1/page/definition/${encodeURIComponent(w)}`).catch(()=>null);
  if(!r?.ok)return null;const d=await r.json().catch(()=>null);
  const defs=Object.values(d||{})[0];if(!defs?.[0])return null;
  return{text:`📖 **"${w}":** ${defs[0].definition?.slice(0,400)}\n${defs[0].examples?.[0]?`💬 *${defs[0].examples[0].slice(0,200)}*`:''}`,src:'Wiktionary',c:'#10b981'};
}
async function doCountry(q){
  const d=await fj(`https://restcountries.com/v3.1/name/${encodeURIComponent(q)}`);
  if(!Array.isArray(d)||!d[0])return null;const c=d[0];
  return{text:`🌍 **${c.name.common}** (${c.cca2})\n🏙️ ${c.capital?.[0]||'?'} | 👥 ${c.population?.toLocaleString()} abitan\n🗣️ ${Object.values(c.languages||{}).join(', ')}\n💰 ${Object.values(c.currencies||{}).map(x=>`${x.name} (${x.symbol||'?'})`).join(', ')}`,src:'RestCountries',c:'#3b82f6'};
}
async function doNasa(){
  const d=await fj('https://api.nasa.gov/planetary/apod?api_key=DEMO_KEY');
  return d?.title?{text:`🌌 **NASA APOD:** ${d.title}\n📅 ${d.date}\n${d.explanation?.slice(0,350)}`,src:'NASA APOD',c:'#06b6d4',url:d.url}:null;
}
async function doJoke(){
  let d=await fj('https://v2.jokeapi.dev/joke/Any?safe-mode&type=single&lang=fr');
  if(!d?.joke)d=await fj('https://v2.jokeapi.dev/joke/Any?safe-mode&type=single');
  return d?.joke?{text:`😄 ${d.joke}`,src:'JokeAPI',c:'#fbbf24'}:null;
}
async function doQuote(){
  const d=await fj('https://api.quotable.io/random');
  return d?.content?{text:`💬 *"${d.content}"*\n— **${d.author}**`,src:'Quotable',c:'#38bdf8'}:null;
}
async function doTrivia(){
  const d=await fj('https://opentdb.com/api.php?amount=1&type=multiple');
  if(!d?.results?.[0])return null;const q=d.results[0];
  const dec=h=>{const el=document.createElement('textarea');el.innerHTML=h;return el.value;};
  return{text:`🎯 **Quiz ${dec(q.category)} (${q.difficulty}):**\n${dec(q.question)}\n\n✅ **${dec(q.correct_answer)}**\n❌ ${q.incorrect_answers.map(a=>dec(a)).slice(0,3).join(', ')}`,src:'Open Trivia DB',c:'#a78bfa'};
}
async function doMusic(q){
  const d=await fj(`https://musicbrainz.org/ws/2/recording?query=${encodeURIComponent(q)}&limit=1&fmt=json`);
  if(!d?.recordings?.[0])return null;const m=d.recordings[0];
  return{text:`🎵 **${m.title}** — ${m['artist-credit']?.[0]?.artist?.name||'?'}\n💿 ${m.releases?.[0]?.title||'?'} (${m.date?.slice(0,4)||'?'})`,src:'MusicBrainz',c:'#8b5cf6'};
}
async function doPoke(q){
  const d=await fj(`https://pokeapi.co/api/v2/pokemon/${encodeURIComponent(q.toLowerCase())}`);
  if(!d?.name)return null;
  return{text:`⚡ **${d.name.toUpperCase()}** (#${d.id})\n🏷️ ${d.types?.map(t=>t.type.name).join(', ')} | 📏 ${d.height/10}m / ${d.weight/10}kg`,src:'PokeAPI',c:'#fbbf24'};
}
async function doAnime(q){
  const d=await fj(`https://api.jikan.moe/v4/anime?q=${encodeURIComponent(q)}&limit=1&sfw=true`);
  if(!d?.data?.[0])return null;const a=d.data[0];
  return{text:`🎌 **${a.title}** (${a.year||'?'}) ⭐${a.score||'?'}/10\n${a.synopsis?.slice(0,250)||''}`,src:'Jikan Anime',c:'#f472b6'};
}
async function doMeal(q){
  const d=await fj(`https://www.themealdb.com/api/json/v1/1/search.php?s=${encodeURIComponent(q)}`);
  if(!d?.meals?.[0])return null;const m=d.meals[0];
  const ing=[];for(let i=1;i<=5;i++)if(m[`strIngredient${i}`])ing.push(`${m[`strMeasure${i}`]?.trim()||''} ${m[`strIngredient${i}`]}`.trim());
  return{text:`🍲 **${m.strMeal}** (${m.strArea||'?'})\n🥄 ${ing.join(', ')}\n${m.strInstructions?.slice(0,280)||''}`,src:'TheMealDB',c:'#fb923c'};
}
async function doHN(){
  const ids=await fj('https://hacker-news.firebaseio.com/v0/topstories.json');if(!ids)return null;
  const s=await fj(`https://hacker-news.firebaseio.com/v0/item/${ids[0]}.json`);
  return s?.title?{text:`📰 **HackerNews:** ${s.title}\n👍 ${s.score} pwen | 💬 ${s.descendants||0} kòmantè`,src:'HackerNews',c:'#f97316',url:s.url}:null;
}
async function doNum(n){
  const t=await ft(`http://numbersapi.com/${n}/trivia`);
  return(t&&!t.includes('missing'))?{text:`🔢 ${t}`,src:'Numbers API',c:'#a78bfa'}:null;
}

// ═══ CLAUDE AI ═══
async function askClaude(question,ctx){
  try{
    const ctxStr=Object.values(ctx).filter(v=>v?.text)
      .map(v=>`=== ${v.src} ===\n${v.text}`).join('\n\n');

    const sys=`Tu es FAST v7, un moteur de recherche intelligent et un assistant IA expert qui répond comme un vrai AI (ChatGPT/Gemini/Claude).

RÈGLES ABSOLUES :
1. Réponds TOUJOURS dans la même langue que la question (créole haïtien, français, ou anglais)
2. Tu connais TOUT : personnes célèbres, histoire, sciences, culture, sport, géographie, maths, technologie
3. Si on te demande "ki moun ki Michael Jordan" → donne sa biographie complète :
   - Date de naissance (17 février 1963, Brooklyn, New York)
   - Carrière NBA (Chicago Bulls, Washington Wizards)
   - 6 titres NBA, 5 MVP, 6x Finals MVP
   - Considéré le meilleur basketteur de tous les temps (GOAT)
4. Pour toute personne connue → donne date naissance, carrière, achievements, faits importants
5. JAMAIS répondre "mwen pa konnen" pour des faits généraux connus
6. Si tu as des données API temps réel → intègre-les dans ta réponse
7. Si pas de données API → utilise ta connaissance complète
8. Utilise **bold**, émojis, structure claire pour des réponses lisibles
9. Sois précis, complet, et vraiment utile comme un moteur de recherche de qualité

CONTEXTE DONNÉES TEMPS RÉEL :
${ctxStr||'Aucune donnée API pour cette question — utilise ta connaissance complète.'}`;

    const r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-6',max_tokens:1000,
        system:sys,
        messages:[{role:'user',content:question}]
      })
    });
    if(r.ok){
      const d=await r.json();
      const t=d.content?.filter(b=>b.type==='text').map(b=>b.text).join('');
      if(t?.length>5)return{text:t,src:'Claude AI',c:'#a78bfa',primary:true};
    }
  }catch(e){console.error(e);}
  return null;
}

// ═══ ORCHESTRATOR ═══
async function runAll(question){
  const ql=question.toLowerCase();
  const tasks={};

  tasks.wfr=doWiki(ql,'fr');
  tasks.wen=doWiki(ql,'en');
  tasks.duck=doDuck(ql);

  if(/météo|meteo|tan|weather|klima|lapli|solèy|temperature/i.test(ql)){
    const city=ql.replace(/météo|meteo|weather|tan|klima|lapli|solèy|pou|nan|sou|temperature/gi,'').trim()||'Port-au-Prince';
    tasks.wx=doWeather(city);
  }
  if(/dollar|taux|deviz|usd|eur|htg|monnaie|kòb|echanj/i.test(ql)) tasks.fx=doCurrency();
  if(/bitcoin|btc|eth|ethereum|crypto|krypto|bnb|solana/i.test(ql)){
    const coins=['bitcoin','ethereum','solana','bnb'].filter(c=>ql.includes(c)).join(',');
    tasks.cx=doCrypto(coins||'bitcoin,ethereum,solana');
  }
  if(/arxiv|syantifik|rechèch|academic/i.test(ql)) tasks.ax=doArxiv(ql);
  if(/santé|sante|medsin|maladie|pubmed/i.test(ql)) tasks.pm=doPubmed(ql);
  if(/liv|livre|book/i.test(ql)) tasks.bk=doBooks(ql);
  if(/github|kòd|code|repo/i.test(ql)) tasks.gh=doGithub(ql);
  if(/fim|film|movie|sinema/i.test(ql)) tasks.mv=doTmdb(ql.replace(/fim|film|movie|sinema/gi,'').trim()||ql);
  if(/seri|série|tv/i.test(ql)) tasks.tv=doTmdb(ql.replace(/seri|série|tv/gi,'').trim()||ql,'tv');
  if(/definisyon|definition|signifye|vle di/i.test(ql)){
    const w=ql.replace(/definisyon|definition|signifye|ki vle di|vle di/gi,'').trim();
    tasks.wk=doWikt(w||ql);
  }
  if(/peyi|pays|country|nasyon/i.test(ql)){
    const c=ql.replace(/peyi|pays|country|nasyon/gi,'').trim();tasks.co=doCountry(c||ql);
  }
  if(/nasa|espas|space|planèt|etwal|galaksi/i.test(ql)) tasks.na=doNasa();
  if(/blag|blague|joke|dròl/i.test(ql)) tasks.jk=doJoke();
  if(/sitasyon|quote|pwovèb|inspirasyon/i.test(ql)) tasks.qt=doQuote();
  if(/trivia|quiz|kesyon/i.test(ql)) tasks.tv2=doTrivia();
  if(/mizik|music|chanson|artis/i.test(ql)) tasks.mu=doMusic(ql);
  if(/pokemon|pokémon/i.test(ql)){const pk=ql.replace(/pokemon|pokémon/gi,'').trim();tasks.pk=doPoke(pk||'pikachu');}
  if(/anime|manga/i.test(ql)) tasks.an=doAnime(ql.replace(/anime|manga/gi,'').trim()||ql);
  if(/manje|recette|food|plat/i.test(ql)) tasks.ml=doMeal(ql.replace(/manje|recette|food|plat/gi,'').trim()||ql);
  if(/tech|hackernews/i.test(ql)) tasks.hn=doHN();
  if(/\d{3,}/i.test(ql)){const n=ql.match(/\d+/)?.[0];if(n)tasks.nm=doNum(n);}

  setStat('⏳ Chèche 50+ sous…');
  const raw={};
  await Promise.allSettled(Object.entries(tasks).map(([k,p])=>p?.then(v=>{if(v?.text)raw[k]=v;}).catch(()=>{})));

  setStat('🧠 Claude ap reponn…');
  const cl=await askClaude(question,raw);
  if(cl)raw.claude=cl;
  setStat('Aktif');
  return raw;
}

// ═══ RENDER ═══
function fmt(t){
  if(!t)return'';
  return t
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.*?)\*/g,'<em>$1</em>')
    .replace(/`(.*?)`/g,'<code style="background:var(--p2);padding:1px 5px;border-radius:4px;font-family:JetBrains Mono,monospace;font-size:12px">$1</code>')
    .replace(/\n/g,'<br>');
}

function buildHTML(q,res,imgUrl){
  const valid=Object.entries(res).filter(([,v])=>v?.text);
  if(!valid.length&&!imgUrl)return`<span style="color:var(--t2)">Pa jwenn pou "<em>${q}</em>". Eseye lòt mo.</span>`;
  const id='m'+(++mc);let html='';

  // Claude answer first
  const cl=res.claude;
  if(cl?.text)html+=`<div style="line-height:1.76;margin-bottom:10px">${fmt(cl.text)}</div>`;

  // Image
  if(imgUrl){
    html+=`<div class="gi-wrap">
      <div class="skel" id="sk${id}"></div>
      <img class="gi" id="gi${id}" style="display:none"
        src="${imgUrl}"
        onload="document.getElementById('sk${id}')?.remove();this.style.display='block'"
        onerror="document.getElementById('sk${id}')?.remove();this.insertAdjacentHTML('afterend','<p style=\\'color:var(--rose);font-size:12px;margin-top:6px\\'>⚠️ Imaj pa chaje.</p>');this.remove()"
        alt="${q}">
      <div class="gi-cap">🎨 Pollinations.AI · Gratis</div>
    </div>`;
  }

  // Source cards
  const others=valid.filter(([k])=>k!=='claude');
  if(others.length){
    html+=`<div class="divider"></div><div style="font-size:10px;color:var(--t4);margin-bottom:7px">📡 ${others.length} sous konsilte:</div>`;
    for(const[,v]of others){
      const c=v.c||'#4ade80';
      html+=`<div class="sc" style="border-color:${c}44">
        <div class="sc-n" style="color:${c}">● ${v.src}</div>
        <div class="sc-t">${fmt((v.text||'').slice(0,280))}</div>
        ${v.url?`<div class="sc-url"><a href="${v.url}" target="_blank" rel="noopener">🔗 ${v.url.slice(0,60)}</a></div>`:''}
      </div>`;
    }
    html+=`<div class="badges">${others.map(([,v])=>`<span class="badge">✓ ${v.src}</span>`).join('')}</div>`;
  }

  // Voice button
  const plain=(cl?.text||valid[0]?.[1]?.text||'').replace(/<[^>]+>/g,'').slice(0,600);
  if(plain.length>20){
    const safe=JSON.stringify(plain);
    html+=`<button class="vbtn" id="vb${id}" onclick="speak(${safe},this)">
      <div class="waves"><span></span><span></span><span></span><span></span><span></span></div>
      🔊 Koute repons lan
    </button>`;
  }
  return html;
}

// ═══ SEND ═══
async function sendQ(){
  const inp=document.getElementById('uinput'),q=inp.value.trim();
  if(!q||busy)return;
  busy=true;document.getElementById('sbtn').disabled=true;
  addMsg('u',`<p>${q.replace(/</g,'&lt;')}</p>`);
  inp.value='';autoR(inp);showTyp();

  let res={},imgUrl=null;
  try{
    if(imgMode){[imgUrl,res.claude]=await Promise.all([genImg(q),askClaude(q,{})]);if(!res.claude?.text)delete res.claude;}
    else res=await runAll(q);
  }catch(e){console.error(e);}

  clearInterval(pgIv);
  const pf=document.getElementById('pgf');if(pf)pf.style.width='100%';
  setTimeout(()=>{
    document.getElementById('typ')?.remove();
    const html=buildHTML(q,res,imgUrl);
    addMsg('a',html);saveH(q,html);
    busy=false;document.getElementById('sbtn').disabled=false;inp.focus();
  },280);
}
