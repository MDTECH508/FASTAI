<!DOCTYPE html>
<html lang="fr" class="h-full">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass-liquid { background: rgba(255, 255, 255, 0.04); backdrop-filter: blur(30px); border: 1px solid rgba(255, 255, 255, 0.1); }
        body { background-color: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="h-screen flex flex-col items-center">

    <div class="w-full max-w-2xl flex-1 overflow-y-auto px-4 py-8 space-y-6" id="chatBox">
        <div class="glass-liquid p-6 rounded-3xl">Mwen pare! Poze kesyon w, m ap korije òtograf ou epi m ap ba w repons.</div>
    </div>

    <div class="w-full max-w-2xl p-4">
        <div class="glass-liquid p-2 rounded-full flex items-center shadow-2xl border border-gray-800">
            <input type="text" id="userInput" placeholder="Poze kesyon w lan..." class="flex-1 bg-transparent outline-none px-6 h-12">
            <button onclick="smartSearch()" class="bg-blue-600 px-8 py-3 rounded-full font-bold hover:bg-blue-500 transition">Search</button>
        </div>
    </div>

    <script>
        async function smartSearch() {
            const input = document.getElementById('userInput');
            const rawQuery = input.value;
            const words = rawQuery.trim().split(/\s+/);
            const chatBox = document.getElementById('chatBox');
            
            if(!rawQuery) return;

            chatBox.innerHTML += `<div class="glass-liquid p-4 rounded-3xl ml-auto w-fit text-sm">${rawQuery}</div>`;
            input.value = '';

            // Amelyorasyon: 100 mo limit
            const isHeavy = words.length > 100;

            try {
                const res = await fetch(`https://fr.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(rawQuery)}&format=json&origin=*`);
                const data = await res.json();
                let result = data.query.search[0]?.snippet.replace(/<[^>]*>?/gm, '') || "Pa gen repons.";

                if (isHeavy) {
                    // Si kesyon an twò lou, bay yon ti pati + envitasyon Premium
                    const truncated = result.split('.').slice(0, 2).join('.') + "...";
                    appendResponse(truncated + "\n\n⚠️ *Kesyon sa a twò long (plis pase 100 mo). Pase nan vèsyon **Premium** pou detay konplè ak analiz pwofondè.*", "Smart AI");
                } else {
                    appendResponse(result, "Smart AI");
                }
            } catch(e) {
                appendResponse("Erè rezo, tanpri reeseye.", "System");
            }
        }

        function appendResponse(text, source) {
            document.getElementById('chatBox').innerHTML += `
                <div class="glass-liquid p-6 rounded-3xl border border-gray-800">
                    <p class="text-[10px] text-blue-400 font-bold mb-2 uppercase">${source}</p>
                    <p class="text-base">${text}</p>
                </div>`;
            document.getElementById('chatBox').scrollTop = document.getElementById('chatBox').scrollHeight;
        }
    </script>
</body>
</html>
